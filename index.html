            // Control Methods
            adjustPlayers(delta) {
                this.setupData.totalPlayers = Math.max(2, Math.min(20, this.setupData.totalPlayers + delta));
                
                // Ensure placesPaid stays in valid range (2–4)
                if (![2, 3, 4].includes(this.placesPaid)) {
                    this.placesPaid = 3;
                    this.payoutPercentages = this.getDefaultPayoutPercentages(this.placesPaid);
                }
                
                // Remove conditions that would now be invalid (>= new total players)
                this.levelLengthConditions = this.levelLengthConditions.filter(
                    cond => cond.playersRemaining < this.setupData.totalPlayers
                );
                
                this.render();
            }

            adjustBuyIn(delta) {
                this.setupData.buyIn = Math.max(100, this.setupData.buyIn + delta);
                this.render();
            }

            adjustDuration(delta) {
                this.setupData.levelDuration = Math.max(1, Math.min(60, this.setupData.levelDuration + delta));
                // Remove any conditions that would now be invalid (>= new base duration)
                this.levelLengthConditions = this.levelLengthConditions.filter(
                    cond => cond.minutes < this.setupData.levelDuration
                );
                this.render();
            }

            toggleVariableLevelLength() {
                this.variableLevelLength = !this.variableLevelLength;
                if (!this.variableLevelLength) {
                    this.levelLengthConditions = [];
                    this.levelBasedConditions = [];
                }
                this.render();
            }

            setLevelLengthMode(mode) {
                this.levelLengthMode = mode;
                this.render();
            }

            addCondition() {
                const playersInput = document.getElementById('conditionPlayers');
                const minutesInput = document.getElementById('conditionMinutes');
                
                const playersRemaining = parseInt(playersInput.value);
                const minutes = parseInt(minutesInput.value);
                
                // Validation
                if (isNaN(playersRemaining) || isNaN(minutes)) {
                    alert('Please enter valid numbers');
                    return;
                }
                
                if (playersRemaining < 2 || playersRemaining >= this.setupData.totalPlayers) {
                    alert(`Players must be between 2 and ${this.setupData.totalPlayers - 1}`);
                    return;
                }
                
                if (minutes >= this.setupData.levelDuration) {
                    alert(`Minutes must be less than base duration (${this.setupData.levelDuration} min)`);
                    return;
                }
                
                if (minutes < 1) {
                    alert('Minutes must be at least 1');
                    return;
                }
                
                // Check if condition for this player count already exists
                const existingIndex = this.levelLengthConditions.findIndex(
                    cond => cond.playersRemaining === playersRemaining
                );
                
                if (existingIndex !== -1) {
                    // Update existing condition
                    this.levelLengthConditions[existingIndex].minutes = minutes;
                } else {
                    // Add new condition
                    this.levelLengthConditions.push({ playersRemaining, minutes });
                }
                
                // Sort by player count descending (more players = higher in list)
                this.levelLengthConditions.sort((a, b) => b.playersRemaining - a.playersRemaining);
                
                // Validate that each lower player count has shorter (or equal) time
                let valid = true;
                let prevMinutes = this.setupData.levelDuration;
                for (const cond of this.levelLengthConditions) {
                    if (cond.minutes > prevMinutes) {
                        valid = false;
                        break;
                    }
                    prevMinutes = cond.minutes;
                }
                
                if (!valid) {
                    // Remove the just-added condition
                    if (existingIndex !== -1) {
                        // Can't easily restore, just warn
                        alert('Each condition must have equal or shorter time than conditions with more players');
                    } else {
                        this.levelLengthConditions = this.levelLengthConditions.filter(
                            cond => cond.playersRemaining !== playersRemaining
                        );
                        alert('Each condition must have equal or shorter time than conditions with more players');
                    }
                }
                
                this.render();
            }

            removeCondition(index) {
                this.levelLengthConditions.splice(index, 1);
                this.render();
            }

            addLevelCondition() {
                const fromLevelInput = document.getElementById('conditionFromLevel');
                const minutesInput = document.getElementById('conditionLevelMinutes');

                const fromLevel = parseInt(fromLevelInput.value);
                const minutes = parseInt(minutesInput.value);

                if (isNaN(fromLevel) || isNaN(minutes)) {
                    alert('Please enter valid numbers');
                    return;
                }

                if (fromLevel < 1 || fromLevel > this.blindLevels.length) {
                    alert(`Level must be between 1 and ${this.blindLevels.length}`);
                    return;
                }

                if (minutes < 1) {
                    alert('Minutes must be at least 1');
                    return;
                }

                const existingIndex = this.levelBasedConditions.findIndex(c => c.fromLevel === fromLevel);
                if (existingIndex !== -1) {
                    this.levelBasedConditions[existingIndex].minutes = minutes;
                } else {
                    this.levelBasedConditions.push({ fromLevel, minutes });
                }

                this.levelBasedConditions.sort((a, b) => a.fromLevel - b.fromLevel);
                this.render();
            }

            removeLevelCondition(index) {
                this.levelBasedConditions.splice(index, 1);
                this.render();
            }

            getEffectiveLevelDuration() {
                if (!this.variableLevelLength) {
                    return this.setupData.levelDuration;
                }

                if (this.levelLengthMode === 'levels') {
                    if (this.levelBasedConditions.length === 0) {
                        return this.setupData.levelDuration;
                    }
                    const currentLevelNum = this.blindLevels[this.currentLevel].level;
                    let applicableMinutes = this.setupData.levelDuration;
                    for (const cond of this.levelBasedConditions) {
                        if (currentLevelNum >= cond.fromLevel) {
                            applicableMinutes = cond.minutes;
                        }
                    }
                    return applicableMinutes;
                }

                // Players mode
                if (this.levelLengthConditions.length === 0) {
                    return this.setupData.levelDuration;
                }

                let applicableMinutes = this.setupData.levelDuration;
                for (const cond of this.levelLengthConditions) {
                    if (this.playersRemaining <= cond.playersRemaining && cond.minutes < applicableMinutes) {
                        applicableMinutes = cond.minutes;
                    }
                }

                // Don't go back up once a shorter duration is active
                if (this.activeLevelDuration !== null && this.activeLevelDuration < applicableMinutes) {
                    return this.activeLevelDuration;
                }

                return applicableMinutes;
            }

            // ===== BREAKS =====

            toggleBreaks() {
                this.breaksEnabled = !this.breaksEnabled;
                this.render();
            }

            adjustBreakFrequency(delta) {
                this.breakFrequency = Math.max(1, Math.min(10, this.breakFrequency + delta));
                this.render();
            }

            adjustBreakDuration(delta) {
                this.breakDuration = Math.max(1, Math.min(60, this.breakDuration + delta));
                this.render();
            }

            getBreakPoints() {
                if (!this.breaksEnabled || this.breakFrequency < 1) return new Set();
                const maxLevel = this.blindLevels[this.blindLevels.length - 1].level;
                const points = new Set();
                for (const l of this.blindLevels) {
                    if (l.level % this.breakFrequency === 0 && l.level < maxLevel) {
                        points.add(l.level);
                    }
                }
                return points;
            }

            getBreakLevelNumbers() {
                return [...this.getBreakPoints()].sort((a, b) => a - b);
            }

            startBreak() {
                this.isOnBreak = true;
                this.breakTotalTime = this.breakDuration * 60;
                this.breakTimeLeft = this.breakTotalTime;
                this.userIsScrolling = false;
                this.render();
                this.scrollToCurrentLevel();
            }

            endBreak() {
                this.isOnBreak = false;
                this.breakTimeLeft = 0;
                if (this.currentLevel < this.blindLevels.length - 1) {
                    this.currentLevel++;
                    const effectiveDuration = this.getEffectiveLevelDuration();
                    if (this.levelLengthMode === 'levels' && this.variableLevelLength) {
                        this.activeLevelDuration = effectiveDuration;
                    } else if (this.activeLevelDuration === null || effectiveDuration < this.activeLevelDuration) {
                        this.activeLevelDuration = effectiveDuration;
                    }
                    this.totalTime = this.activeLevelDuration * 60;
                    this.timeLeft = this.totalTime;
                    this.isExtended = false;
                }
                this.userIsScrolling = false;
                this.checkSurvivorBonus();
                this.render();
                this.scrollToCurrentLevel();
            }

            updateBreakDisplay() {
                const timerEl = document.querySelector('.main-timer');
                const progressEl = document.querySelector('.progress-line');
                if (!timerEl || !progressEl) return;
                timerEl.textContent = this.formatTime(this.breakTimeLeft);
                timerEl.classList.toggle('dim', !this.isRunning);
                timerEl.classList.remove('critical');
                const pct = this.breakTotalTime > 0 ? ((this.breakTotalTime - this.breakTimeLeft) / this.breakTotalTime) * 100 : 0;
                progressEl.style.width = pct + '%';
                progressEl.classList.remove('critical');
            }

            // ===== SURVIVOR CHIPS =====

            toggleSurvivorChips() {
                this.survivorChipsEnabled = !this.survivorChipsEnabled;
                this.render();
            }

            adjustSurvivorChipValue(delta) {
                this.survivorChipValue = Math.max(1000, this.survivorChipValue + delta);
                this.render();
            }

            checkSurvivorBonus() {
                if (!this.survivorChipsEnabled || this.setupData.rebuyCloseLevel === 0) return;
                if (this.survivorBonusTotal > 0) return;
                const currentLevelNum = this.blindLevels[this.currentLevel].level;
                if (currentLevelNum > this.setupData.rebuyCloseLevel) {
                    const survivors = Math.max(0, this.playersRemaining - this.rebuys);
                    this.survivorBonusTotal = survivors * this.survivorChipValue;
                }
            }

            adjustStack(delta) {
                this.setupData.startingStack = Math.max(5000, Math.min(500000, this.setupData.startingStack + delta));
                this.render();
            }

            adjustRebuyCloseLevel(value) {
                this.setupData.rebuyCloseLevel = parseInt(value);
                this.render();
            }

            goToPayouts() {
                this.showSetup = false;
                this.showPayouts = true;

                // Clamp placesPaid to 2-4
                if (![2, 3, 4].includes(this.placesPaid)) {
                    this.placesPaid = 3;
                }

                // Initialize with defaults if not already set correctly
                if (this.payoutPercentages.length !== this.placesPaid) {
                    this.payoutPercentages = this.getDefaultPayoutPercentages(this.placesPaid);
                }
                this.render();
            }

            backToSetup() {
                this.showSetup = true;
                this.showPayouts = false;
                this.render();
            }

            adjustTournamentFee(delta) {
                this.tournamentFee = Math.max(0, this.tournamentFee + delta);
                this.render();
            }

            updatePlacesPaid(value) {
                this.placesPaid = parseInt(value);
                this.payoutPercentages = this.getDefaultPayoutPercentages(this.placesPaid);
                this.render();
            }

            // Called on every keystroke — patches the DOM without rebuilding it
            patchPayoutPercentage(index, value) {
                this.payoutPercentages[index] = parseFloat(value) || 0;

                const percs = this.payoutPercentages;
                const sum = percs.reduce((a, b) => a + (parseFloat(b) || 0), 0);
                const isValid = Math.abs(sum - 100) < 0.001 && percs.every(p => parseFloat(p) > 0);
                const sumDisplay = parseFloat(sum.toFixed(2));

                // Update preview amounts
                const previews = this.calculatePayouts();
                percs.forEach((_, i) => {
                    const el = document.getElementById(`payout-preview-${i}`);
                    if (el) el.textContent = `= ฿${this.formatNumber(previews[i] || 0)}`;
                });

                // Update validation box
                const validEl = document.getElementById('payout-validation');
                if (validEl) {
                    validEl.style.background   = isValid ? 'rgba(16,185,129,0.08)' : 'rgba(239,68,68,0.08)';
                    validEl.style.borderColor  = isValid ? 'var(--success-color)' : 'var(--danger-color)';
                    validEl.innerHTML = isValid
                        ? `<span style="color:var(--success-color);font-weight:600;">✓ Total: 100%</span>`
                        : `<span style="color:var(--danger-color);">Percentages must add up to 100% — currently at ${sumDisplay}%</span>`;
                }

                // Update Next button
                const nextBtn = document.getElementById('payout-next-btn');
                if (nextBtn) nextBtn.disabled = !isValid;
            }

            // Called on blur / Enter — commits and does a full render to sync everything
            updatePayoutPercentage(index, value) {
                this.payoutPercentages[index] = parseFloat(value) || 0;
                this.render();
            }

            goToSeating() {
                this.showPayouts = false;
                this.showSeating = true;
                this.playerNames = new Array(this.setupData.totalPlayers).fill('');
                this.tableCount = this.setupData.totalPlayers > 13 ? 3 : this.setupData.totalPlayers > 7 ? 2 : 1;
                this.tableAssignments = null;
                this.render();
            }

            backToPayouts() {
                this.showSeating = false;
                this.showPayouts = true;
                this.render();
            }

            updatePlayerName(index, value) {
                this.playerNames[index] = value;
            }

            updateTableCount(value) {
                this.tableCount = parseInt(value);
                this.tableAssignments = null;
                this.render();
            }

            shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }

            assignSeats() {
                const filledNames = this.playerNames.filter(n => n.trim() !== '');
                if (filledNames.length !== this.setupData.totalPlayers) {
                    alert(`Please enter all ${this.setupData.totalPlayers} player names`);
                    return;
                }

                this.shuffleNames = filledNames;
                this.startShuffleAnimation(() => {
                    const shuffled = this.shuffleArray(filledNames);
                    
                    if (this.tableCount === 1) {
                        this.tableAssignments = {
                            pokerTable: shuffled
                        };
                    } else if (this.tableCount === 2) {
                        const pokerTableCount = Math.ceil(this.setupData.totalPlayers / 2);
                        this.tableAssignments = {
                            pokerTable: shuffled.slice(0, pokerTableCount),
                            kitchenTable: shuffled.slice(pokerTableCount)
                        };
                    } else {
                        // 3 tables: pool table gets the fewest (floor), extras go to poker then kitchen
                        const n = this.setupData.totalPlayers;
                        const base = Math.floor(n / 3);
                        const extra = n % 3;
                        const pokerCount   = base + (extra >= 1 ? 1 : 0);
                        const kitchenCount = base + (extra >= 2 ? 1 : 0);
                        this.tableAssignments = {
                            pokerTable:   shuffled.slice(0, pokerCount),
                            kitchenTable: shuffled.slice(pokerCount, pokerCount + kitchenCount),
                            poolTable:    shuffled.slice(pokerCount + kitchenCount)
                        };
                    }
                    this.render();
                });
            }

            startShuffleAnimation(onComplete) {
                this.isShuffling = true;
                this.render();
                
                let iterations = 0;
                const maxIterations = 15;
                
                this.shuffleInterval = setInterval(() => {
                    iterations++;
                    
                    const slots = document.querySelectorAll('.shuffle-slot-name');
                    const shuffledDisplay = this.shuffleArray([...this.shuffleNames]);
                    
                    slots.forEach((slot, index) => {
                        if (index < shuffledDisplay.length) {
                            slot.textContent = shuffledDisplay[index];
                            slot.classList.add('spinning');
                            setTimeout(() => slot.classList.remove('spinning'), 50);
                        }
                    });
                    
                    if (iterations >= maxIterations) {
                        clearInterval(this.shuffleInterval);
                        this.shuffleInterval = null;
                        this.isShuffling = false;
                        onComplete();
                    }
                }, 100);
            }

            getPositionLabel(index) {
                if (index === 0) return 'Dealer';
                if (index === 1) return 'SB';
                if (index === 2) return 'BB';
                return null;
            }

            startTournament() {
                this.playersRemaining = this.setupData.totalPlayers;
                this.currentLevel = 0;
                this.isOnBreak = false;
                this.breakTimeLeft = 0;
                this.breakTotalTime = 0;
                this.survivorBonusTotal = 0;
                this.lateRegCount = 0;
                this.lateRegName = '';
                this.showLateReg = false;
                this.lateRegDraw = null;
                this.lateRegStep = 'setup';
                // Seed table counts from actual assignment
                this.lateRegTableCounts = {};
                if (this.tableAssignments) {
                    if (this.tableAssignments.pokerTable)   this.lateRegTableCounts.pokerTable   = this.tableAssignments.pokerTable.length;
                    if (this.tableAssignments.kitchenTable) this.lateRegTableCounts.kitchenTable = this.tableAssignments.kitchenTable.length;
                    if (this.tableAssignments.poolTable)    this.lateRegTableCounts.poolTable    = this.tableAssignments.poolTable.length;
                }
                this.activeLevelDuration = this.getEffectiveLevelDuration();
                this.totalTime = this.activeLevelDuration * 60;
                this.timeLeft = this.activeLevelDuration * 60;
                this.rebuys = 0;
                this.isRunning = false;
                this.isExtended = false;
                this.showSetup = false;
                this.showPayouts = false;
                this.showSeating = false;
                this.showRedraw = false;
                this.showEliminateModal = false;
                this.lastEliminated = null;
                this.redrawResult = null;

                if (this.tableAssignments) {
                    let all = [...this.tableAssignments.pokerTable];
                    if (this.tableAssignments.kitchenTable) all = all.concat(this.tableAssignments.kitchenTable);
                    if (this.tableAssignments.poolTable)    all = all.concat(this.tableAssignments.poolTable);
                    this.originalPlayerNames = all;
                    // Build activePlayers + playerTableMap from initial seating
                    this.activePlayers = [...all];
                    this.playerTableMap = {};
                    const tableKeys = ['pokerTable', 'kitchenTable', 'poolTable'];
                    for (const key of tableKeys) {
                        if (this.tableAssignments[key]) {
                            for (const p of this.tableAssignments[key]) this.playerTableMap[p] = key;
                        }
                    }
                } else {
                    // No seating draw — anonymous mode
                    this.activePlayers = [];
                    this.playerTableMap = {};
                }
                this.userIsScrolling = false; // Allow auto-scroll when tournament starts
                this.render();
                this.scrollToCurrentLevel();
            }

            showRedrawSeating() {
                const pool = this.getRedrawPool();
                if (pool.length === 0) {
                    alert('No player names available. Please set up seating first.');
                    return;
                }
                this.showRedraw = true;
                this.redrawResult = null;
                this.redrawTableCount = this.tableCount; // default to current table count
                // Pre-select all active players; if anonymous, start with none selected
                const useActive = this.activePlayers.length > 0;
                this.redrawSelections = pool.map(() => useActive);
                this.render();
            }

            setRedrawTableCount(count) {
                this.redrawTableCount = count;
                this.render();
            }

            togglePlayerForRedraw(index) {
                this.redrawSelections[index] = !this.redrawSelections[index];
                this.render();
            }

            performRedraw() {
                const pool = this.getRedrawPool();
                const selectedPlayers = pool.filter((_, index) => this.redrawSelections[index]);

                if (selectedPlayers.length < 2) {
                    alert('Please select at least 2 players for redraw.');
                    return;
                }

                this.shuffleNames = selectedPlayers;
                this.startShuffleAnimation(() => {
                    const shuffled = this.shuffleArray(selectedPlayers);
                    if (this.redrawTableCount === 1) {
                        this.redrawResult = [{ name: 'Poker Table', players: shuffled }];
                    } else {
                        const count1 = Math.ceil(shuffled.length / 2);
                        this.redrawResult = [
                            { name: 'Poker Table',   players: shuffled.slice(0, count1) },
                            { name: 'Kitchen Table', players: shuffled.slice(count1) }
                        ];
                    }
                    // Update playerTableMap with new seats
                    const nameToKey = { 'Poker Table': 'pokerTable', 'Kitchen Table': 'kitchenTable', 'Pool Table': 'poolTable' };
                    for (const t of this.redrawResult) {
                        const key = nameToKey[t.name] || 'pokerTable';
                        for (const p of t.players) this.playerTableMap[p] = key;
                    }
                    this.recomputeTableCounts();
                    this.render();
                });
            }

            // Returns the pool of players to use for redraw:
            // activePlayers (if named tracking is on) else originalPlayerNames
            getRedrawPool() {
                return this.activePlayers.length > 0 ? this.activePlayers : this.originalPlayerNames;
            }

            cancelRedraw() {
                this.showRedraw = false;
                this.redrawResult = null;
                this.userIsScrolling = false; // Allow auto-scroll when closing redraw
                this.render();
                this.scrollToCurrentLevel();
            }

            closeRedrawResult() {
                this.showRedraw = false;
                this.redrawResult = null;
                this.userIsScrolling = false; // Allow auto-scroll when closing redraw
                this.render();
                this.scrollToCurrentLevel();
            }

            showSettingsMenu() {
                if (this.isGameInProgress()) {
                    this.showWarning = true;
                } else {
                    this.isRunning = false;
                    this.showSetup = true;
                }
                this.render();
            }

            confirmShowSetup() {
                this.isRunning = false;
                this.showWarning = false;
                this.showSetup = true;
                this.render();
            }

            cancelShowSetup() {
                this.showWarning = false;
                this.userIsScrolling = false; // Allow auto-scroll when closing warning
                this.render();
                this.scrollToCurrentLevel();
            }

            eliminatePlayer() {
                if (this.playersRemaining <= 1) return;
                if (this.activePlayers.length > 0) {
                    // Named mode — show picker
                    this.showEliminateModal = true;
                    this.controlPanelOpen = false;
                    this.render();
                } else {
                    // Anonymous mode — just decrement
                    this.playersRemaining--;
                    if (this.playersRemaining === 1) this.createConfetti();
                    this.playEliminationSound();
                    this.updateStats();
                }
            }

            confirmEliminate(name) {
                this.lastEliminated = { name, table: this.playerTableMap[name] || null };
                this.activePlayers = this.activePlayers.filter(p => p !== name);
                delete this.playerTableMap[name];
                this.playersRemaining = this.activePlayers.length;
                if (this.playersRemaining === 1) this.createConfetti();
                this.playEliminationSound();
                this.showEliminateModal = false;
                this.recomputeTableCounts();
                this.publishState();
                this.render();
            }

            cancelEliminate() {
                this.showEliminateModal = false;
                this.render();
            }

            addPlayer() {
                if (this.activePlayers.length > 0) {
                    // Named mode — restore last eliminated player
                    if (!this.lastEliminated) return;
                    const { name, table } = this.lastEliminated;
                    this.activePlayers.push(name);
                    if (table) this.playerTableMap[name] = table;
                    this.playersRemaining = this.activePlayers.length;
                    this.lastEliminated = null;
                    this.recomputeTableCounts();
                    this.updateStats();
                } else {
                    // Anonymous mode
                    if (this.playersRemaining < this.setupData.totalPlayers) {
                        this.playersRemaining++;
                        this.updateStats();
                    }
                }
            }

            toggleTimer() {
                this.initAudioContext();
                this.isRunning = !this.isRunning;

                // Update status badge
                const badge = document.querySelector('.status-badge');
                if (badge) {
                    if (this.isOnBreak) {
                        badge.innerHTML = `<div class="status-indicator" style="background:#f59e0b;"></div>${this.isRunning ? 'Break' : 'Paused'}`;
                    } else {
                        badge.classList.toggle('running', this.isRunning);
                        badge.classList.toggle('paused', !this.isRunning);
                        badge.innerHTML = `<div class="status-indicator"></div>${this.isRunning ? 'Running' : 'Paused'}`;
                    }
                }

                if (this.isOnBreak) {
                    this.updateBreakDisplay();
                } else {
                    this.updateTimerDisplay();
                }
                this.publishState();
            }

            addTwoMinutes() {
                this.timeLeft += 120;
                this.updateTimerDisplay();
            }

            nextLevel() {
                if (this.isOnBreak) {
                    this.endBreak();
                    return;
                }
                if (this.currentLevel < this.blindLevels.length - 1) {
                    const currentLevelNum = this.blindLevels[this.currentLevel].level;
                    if (this.breaksEnabled && currentLevelNum % this.breakFrequency === 0) {
                        this.startBreak();
                        return;
                    }
                    this.currentLevel++;

                    const effectiveDuration = this.getEffectiveLevelDuration();
                    if (this.levelLengthMode === 'levels' && this.variableLevelLength) {
                        this.activeLevelDuration = effectiveDuration;
                    } else if (this.activeLevelDuration === null || effectiveDuration < this.activeLevelDuration) {
                        this.activeLevelDuration = effectiveDuration;
                    }
                    this.totalTime = this.activeLevelDuration * 60;
                    this.timeLeft = this.totalTime;

                    this.isExtended = false;
                    this.userIsScrolling = false;
                    this.checkSurvivorBonus();
                    this.render();
                    this.scrollToCurrentLevel();
                }
            }

            prevLevel() {
                if (this.isOnBreak) {
                    // Cancel the break, return to the level that just ended
                    this.isOnBreak = false;
                    this.breakTimeLeft = 0;
                    const effectiveDuration = this.getEffectiveLevelDuration();
                    this.activeLevelDuration = effectiveDuration;
                    this.totalTime = this.activeLevelDuration * 60;
                    this.timeLeft = this.totalTime;
                    this.isExtended = false;
                    this.userIsScrolling = false;
                    this.render();
                    this.scrollToCurrentLevel();
                    return;
                }
                if (this.currentLevel > 0) {
                    this.currentLevel--;
                    if (this.levelLengthMode === 'levels' && this.variableLevelLength) {
                        this.activeLevelDuration = this.getEffectiveLevelDuration();
                    }
                    this.totalTime = (this.activeLevelDuration || this.setupData.levelDuration) * 60;
                    this.timeLeft = this.totalTime;
                    this.isExtended = false;
                    this.userIsScrolling = false;
                    this.render();
                    this.scrollToCurrentLevel();
                }
            }

            toggleExtend() {
                this.isExtended = !this.isExtended;
                this.updateTimerDisplay();
                // Update the extend button text in control panel
                const extendBtn = document.querySelector('.control-panel-section:first-child .control-panel-buttons');
                if (extendBtn) {
                    const btn = extendBtn.querySelector('button:last-child');
                    if (btn) {
                        btn.className = `btn ${this.isExtended ? 'btn-primary' : 'btn-secondary'}`;
                        btn.textContent = this.isExtended ? 'Extended' : 'Extend';
                    }
                }
            }

            toggleSound() {
                this.soundEnabled = !this.soundEnabled;
                // Update the sound button icon in control panel
                const settingsSection = document.querySelector('.control-panel-section:last-child .control-panel-buttons');
                if (settingsSection) {
                    const soundBtn = settingsSection.querySelector('button:first-child');
                    if (soundBtn) soundBtn.innerHTML = this.soundEnabled ? icons.Volume2 : icons.VolumeX;
                }
            }

            testSound() {
                this.playWarningSound();
            }

            addRebuy() {
                if (this.areRebuysOpen()) {
                    this.rebuys++;
                    this.playRebuySound();
                    this.updateStats();
                }
            }

            undoRebuy() {
                if (this.rebuys > 0) {
                    this.rebuys--;
                    this.updateStats();
                }
            }

            toggleControlPanel() {
                this.controlPanelOpen = !this.controlPanelOpen;
                const overlay = document.querySelector('.control-panel-overlay');
                const panel = document.querySelector('.control-panel');
                if (overlay && panel) {
                    overlay.classList.toggle('open', this.controlPanelOpen);
                    panel.classList.toggle('open', this.controlPanelOpen);
                } else {
                    this.render();
                }
            }
        }

        const app = new PokerTimer();
        window.app = app;
    </script>
</body>
</html>
