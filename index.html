            }

            // ===== END ABLY =====

            // Derive lateRegTableCounts from who is currently at each table
            recomputeTableCounts() {
                if (Object.keys(this.playerTableMap).length === 0) return;
                const counts = {};
                for (const name of this.activePlayers) {
                    const t = this.playerTableMap[name];
                    if (t) counts[t] = (counts[t] || 0) + 1;
                }
                this.lateRegTableCounts = counts;
            }

            initAudioContext() {
                if (!this.audioContextInitialized) {
                    try {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        ctx.resume();
                        ctx.close();
                        this.audioContextInitialized = true;
                    } catch (e) {
                        console.log('Audio context initialization:', e);
                    }
                }
            }

            playWarningSound() {
                if (!this.soundEnabled) return;
                try {
                    if (!this._warningAudio) {
                        this._warningAudio = new Audio('sounds/mixkit-repeating-arcade-beep-1084.mp3');
                        this._warningAudio.volume = 0.8;
                    }
                    this._warningAudio.currentTime = 0;
                    this._warningAudio.play().catch(e => console.log('Could not play warning sound:', e));
                } catch (e) {
                    console.log('Could not play warning sound:', e);
                }
            }

            playLevelEndSound() {
                if (!this.soundEnabled) return;
                try {
                    if (!this._levelEndAudio) {
                        this._levelEndAudio = new Audio('sounds/mixkit-arcade-race-game-countdown-1952.mp3');
                        this._levelEndAudio.volume = 0.8;
                    }
                    this._levelEndAudio.currentTime = 0;
                    this._levelEndAudio.play().catch(e => console.log('Could not play level end sound:', e));
                } catch (e) {
                    console.log('Could not play level end sound:', e);
                }
            }

            playEliminationSound() {
                try {
                    if (!this._eliminationAudio) {
                        this._eliminationAudio = new Audio('sounds/elimination.mp3');
                        this._eliminationAudio.volume = 1.0;
                    }
                    this._eliminationAudio.currentTime = 0;
                    this._eliminationAudio.play().catch(() => {});
                } catch (e) {}
            }

            playRebuySound() {
                try {
                    if (!this._rebuyAudio) {
                        this._rebuyAudio = new Audio('sounds/rebuy.mp3');
                        this._rebuyAudio.volume = 1.0;
                    }
                    this._rebuyAudio.currentTime = 0;
                    this._rebuyAudio.play().catch(() => {});
                } catch (e) {}
            }

            // ── Clock feature ─────────────────────────────────────────────
            startClock() {
                clearInterval(this.clockInterval);
                this.clockActive   = true;
                this.clockTimeLeft = 30;
                this.clock2Played  = false;
                this.render();
                this.publishState();

                // Play announcement sound, then begin countdown when it finishes
                try {
                    const audio = new Audio('sounds/clock1.mp3');
                    audio.volume = 1.0;
                    const begin = () => this.startClockCountdown();
                    audio.addEventListener('ended', begin, { once: true });
                    audio.play().catch(begin); // if play() fails, start immediately
                } catch(e) {
                    this.startClockCountdown();
                }
            }

            startClockCountdown() {
                if (!this.clockActive) return; // cancelled during announcement
                clearInterval(this.clockInterval);
                this.clockInterval = setInterval(() => {
                    if (!this.clockActive) { clearInterval(this.clockInterval); return; }
                    this.clockTimeLeft--;

                    if (this.clockTimeLeft === 3 && !this.clock2Played) {
                        this.clock2Played = true;
                        try { new Audio('sounds/clock2.mp3').play().catch(() => {}); } catch(e) {}
                    }

                    if (this.clockTimeLeft <= 0) {
                        clearInterval(this.clockInterval);
                        // Show "0" and linger for 3 s before dismissing
                        const numEl = document.getElementById('clock-number');
                        if (numEl) {
                            numEl.textContent = '0';
                            numEl.className   = 'clock-number mono clock-red clock-pulse';
                        }
                        this.clockTimeLeft = 0;
                        this.publishState(); // broadcast the 0 state while still active
                        setTimeout(() => {
                            if (!this.clockActive) return; // cancelled during linger
                            this.clockActive = false;
                            this.render();
                            this.publishState();
                        }, 3000);
                        return;
                    }

                    // Patch just the countdown number — no full re-render
                    const numEl = document.getElementById('clock-number');
                    if (numEl) {
                        numEl.textContent = this.clockTimeLeft;
                        const colorClass = this.clockTimeLeft <= 3  ? 'clock-red'
                                         : this.clockTimeLeft <= 10 ? 'clock-amber'
                                         :                            'clock-white';
                        const pulseClass = this.clockTimeLeft <= 10 ? 'clock-pulse' : '';
                        numEl.className = `clock-number mono ${colorClass} ${pulseClass}`;
                    }
                    this.publishState();
                }, 1000);
            }

            cancelClock() {
                clearInterval(this.clockInterval);
                this.clockActive = false;
                this.render();
                this.publishState();
            }

                const colors = ['#ffffff', '#10b981', '#ef4444', '#3b82f6', '#ec4899'];

                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animation = `confetti-fall ${2 + Math.random() * 2}s linear forwards`;
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4500);
                }
            }

            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            formatNumber(num) {
                return num.toLocaleString();
            }

            formatNumberCompact(num) {
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(num % 1000000 === 0 ? 0 : 1) + 'M';
                } else if (num >= 1000) {
                    return (num / 1000).toFixed(num % 1000 === 0 ? 0 : 1) + 'k';
                }
                return num.toString();
            }

            getOrdinal(num) {
                const suffixes = ['th', 'st', 'nd', 'rd'];
                const v = num % 100;
                return num + (suffixes[(v - 20) % 10] || suffixes[v] || suffixes[0]);
            }

            getDefaultPayoutPercentages(places) {
                const defaults = { 2: [65, 35], 3: [50, 30, 20], 4: [40, 30, 20, 10] };
                return defaults[places] ? [...defaults[places]] : new Array(places).fill(Math.round(100 / places));
            }

            calculatePayouts() {
                const totalPool = (this.setupData.totalPlayers * this.setupData.buyIn)
                    + ((this.rebuys + this.lateRegCount) * this.setupData.buyIn)
                    - this.tournamentFee;
                if (totalPool <= 0) return new Array(this.placesPaid).fill(0);

                const percs = this.payoutPercentages.slice(0, this.placesPaid);
                const exacts   = percs.map(p => totalPool * (parseFloat(p) || 0) / 100);
                const floored  = exacts.map(e => Math.floor(e / 1000) * 1000);
                const remainders = exacts.map((e, i) => e - floored[i]);

                const flooredTotal = floored.reduce((a, b) => a + b, 0);
                const missing = totalPool - flooredTotal;

                // All rounding error goes to 1st place
                const result = [...floored];
                result[0] += missing;
                return result;
            }

            getPayoutTickerContent() {
                const medals = ['🥇', '🥈', '🥉'];
                const currentPayouts = this.calculatePayouts();
                return currentPayouts.slice(0, this.placesPaid).map((amount, index) => {
                    const medal = index < 3 ? medals[index] + ' ' : '';
                    return `${medal}${this.getOrdinal(index + 1)}: ฿${this.formatNumberCompact(amount)}`;
                }).join(' • ');
            }

            areRebuysOpen() {
                if (this.setupData.rebuyCloseLevel === 0) return false;
                return this.currentLevel < this.setupData.rebuyCloseLevel;
            }

            isGameInProgress() {
                return this.currentLevel > 0 || 
                       this.playersRemaining < this.setupData.totalPlayers || 
                       this.timeLeft < this.totalTime || 
                       this.isRunning;
            }

            scrollToCurrentLevel() {
                // Don't auto-scroll if user is actively scrolling
                if (this.userIsScrolling) {
                    return;
                }
                
                // Scroll so the active level appears at a fixed position at the top
                setTimeout(() => {
                    const timeline = document.querySelector('.rail-timeline');
                    const active = document.querySelector('.timeline-item.active');
                    
                    if (timeline && active) {
                        // Fixed position: keep active item at the very top of the timeline
                        const fixedOffset = 0; // At the very top (1st slot)
                        
                        // Calculate how much to scroll to put active item at the fixed position
                        const scrollTop = active.offsetTop - timeline.offsetTop - fixedOffset;
                        
                        // Scroll the list (will naturally stop at max scroll)
                        timeline.scrollTop = Math.max(0, scrollTop);
                    }
                }, 0);
            }

                const modalWrapper = document.querySelector('.modal-wrapper');

                let content = '';
                
                if (this.showSetup) {

                } else if (this.showWarning) {

                } else if (this.showEliminateModal) {

                } else {
                    content = this.renderGame();
                }
                
                if (this.isShuffling) {
                    content += this.renderShuffleAnimation();
                }
                
                app.innerHTML = content;
                
                // Restore scroll positions (use rAF for Safari which needs a frame to lay out new DOM)
                requestAnimationFrame(() => {
                    if (timelineScroll > 0) {
                        const newTimeline = document.querySelector('.rail-timeline');
                        if (newTimeline) {

                        }

                                        </div>
                                    </div>
                                `).join('')}

                                <div id="payout-validation" style="margin-top:1rem;padding:0.75rem 1rem;border-radius:0.5rem;
                                    background:${isValid ? 'rgba(16,185,129,0.08)' : 'rgba(239,68,68,0.08)'};
                                    border:1px solid ${isValid ? 'var(--success-color)' : 'var(--danger-color)'};
                                    text-align:center;">
                                    ${isValid
                                        ? `<span style="color:var(--success-color);font-weight:600;">✓ Total: 100%</span>`
                                        : `<span style="color:var(--danger-color);">Percentages must add up to 100% — currently at ${sumDisplay}%</span>`
                                    }
                                </div>
                            </div>

                            <div class="setup-buttons">
                                <button onclick="app.backToSetup()" class="btn btn-secondary flex-1">
                                    Back to Setup
                                </button>
                                <button id="payout-next-btn" onclick="app.goToSeating()" class="btn btn-primary flex-1" ${!isValid ? 'disabled' : ''}>
                                    Next: Seating
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderSeating() {
                if (this.tableAssignments) {
                    return this.renderSeatingResult();
                }
                return this.renderSeatingInput();
            }

            renderSeatingInput() {
                return `
                    <div class="modal-wrapper">
                        <div class="setup-content">
                            <div class="setup-header">
                                <h1 class="setup-title">SEATING ASSIGNMENT</h1>
                                <p class="setup-subtitle">Enter player names for random seat assignment</p>
                            </div>

                            <div class="setup-card">
                                <div class="setup-group">
                                    <label class="setup-label">Number of Tables</label>
                                    <div style="display: flex; justify-content: center;">
                                        <select onchange="app.updateTableCount(this.value)" class="setup-select">
                                            <option value="1" ${this.tableCount === 1 ? 'selected' : ''}>1 Table</option>
                                            <option value="2" ${this.tableCount === 2 ? 'selected' : ''}>2 Tables</option>
                                            <option value="3" ${this.tableCount === 3 ? 'selected' : ''}>3 Tables</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="setup-group">
                                    <label class="setup-label">Player Names (${this.setupData.totalPlayers} players)</label>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                                        ${this.playerNames.map((name, index) => `
                                            <input 
                                                type="text" 
                                                value="${name}" 
                                                onchange="app.updatePlayerName(${index}, this.value)"
                                                oninput="app.updatePlayerName(${index}, this.value)"
                                                class="setup-input"
                                                placeholder="Player ${index + 1}"
                                            >
                                        `).join('')}
                                    </div>
                                </div>

                                <button onclick="app.assignSeats()" class="btn btn-primary" style="width: 100%; padding: 1rem;">
                                    ${icons.Shuffle} Randomly Assign Seats
                                </button>
                            </div>

                            <button onclick="app.backToPayouts()" class="btn btn-secondary" style="width: 100%; padding: 0.75rem; margin-top: 1rem;">
                                Back to Payouts
                            </button>
                        </div>
                    </div>
                `;
            }

            renderSeatingResult() {
                const tables = this.tableCount === 1
                    ? [{ key: 'pokerTable', name: 'Poker Table' }]
                    : this.tableCount === 2
                        ? [{ key: 'pokerTable', name: 'Poker Table' }, { key: 'kitchenTable', name: 'Kitchen Table' }]
                        : [{ key: 'pokerTable', name: 'Poker Table' }, { key: 'kitchenTable', name: 'Kitchen Table' }, { key: 'poolTable', name: 'Pool Table' }];

                const gridCols = this.tableCount === 1 ? '1fr' : this.tableCount === 2 ? '1fr 1fr' : '1fr 1fr 1fr';
                const maxW     = this.tableCount === 3 ? '1200px' : '900px';

                return `
                    <div class="modal-wrapper">
                        <div class="setup-content" style="max-width: ${maxW};">
                            <div class="setup-header">
                                <h1 class="setup-title">TABLE ASSIGNMENTS</h1>
                                <p class="setup-subtitle">Players have been randomly assigned to seats</p>
                            </div>

                            <div style="display: grid; grid-template-columns: ${gridCols}; gap: 2rem;">
                                ${tables.map(table => `
                                    <div class="setup-card">
                                        <h2 style="text-align: center; font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem;">
                                            ${table.name}
                                        </h2>
                                        <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                                            ${this.tableAssignments[table.key].map((player, index) => {
                                                const position = this.getPositionLabel(index);
                                                return `
                                                    <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.03); border-radius: 0.375rem; padding: 0.75rem 1rem; border: 1px solid #333;">
                                                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                                                            <span class="mono dim" style="font-size: 0.75rem; width: 32px;">#${index + 1}</span>
                                                            <span style="font-size: 1rem; font-weight: 500;">${player}</span>
                                                        </div>
                                                        ${position ? `
                                                            <span style="background: rgba(255, 255, 255, 0.1); padding: 0.25rem 0.75rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600; color: var(--text-dim);">
                                                                ${position}
                                                            </span>
                                                        ` : ''}
                                                    </div>
                                                `;
                                            }).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <button onclick="app.startTournament()" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 2rem;">
                                Start Tournament
                            </button>
                        </div>
                    </div>
                `;
            }

            renderGame() {
                const cur = this.blindLevels[this.currentLevel];
                const pool = (this.setupData.totalPlayers * this.setupData.buyIn) + (this.rebuys * this.setupData.buyIn) - this.tournamentFee;
                const totalChipsInPlay = (this.setupData.totalPlayers * this.setupData.startingStack) + (this.rebuys * this.setupData.startingStack) + this.survivorBonusTotal;
                const avgChips = Math.round(totalChipsInPlay / this.playersRemaining);
                
                // UPDATED: Logic to remove decimals if BB > 10
                const rawBB = avgChips / cur.big;
                const avgBB = rawBB.toFixed(rawBB >= 10 ? 0 : 1);
                
                const pct = ((this.totalTime - this.timeLeft) / this.totalTime) * 100;

                return `
                    <div class="split-layout">
                        <div class="rail">
                            <div class="rail-header">
                                <div style="font-weight:800; letter-spacing:-0.05em; font-size:1.5rem;">RISITHAI<br>POKER TOUR</div>
                            </div>
                            
                            <div class="rail-stats">
                                <div class="stat-block">
                                    <label>Players</label>
                                    <div class="value">${this.playersRemaining}/${this.setupData.totalPlayers}</div>
                                </div>
                                ${this.setupData.rebuyCloseLevel > 0 ? `
                                    <div class="stat-block">
                                        <label>Rebuys</label>
                                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                                            <div class="value mono">${this.rebuys}</div>
                                            <span style="
                                                padding: 0.2rem 0.5rem; 
                                                border-radius: 0.25rem; 
                                                font-size: 0.6rem; 
                                                font-weight: 600;
                                                text-transform: uppercase;
                                                letter-spacing: 0.05em;
                                                ${this.areRebuysOpen() ? 
                                                    'background: rgba(16, 185, 129, 0.15); color: var(--success-color); border: 1px solid var(--success-color);' : 
                                                    'background: rgba(239, 68, 68, 0.15); color: var(--danger-color); border: 1px solid var(--danger-color);'}
                                            ">
                                                ${this.areRebuysOpen() ? 'OPEN' : 'CLOSED'}
                                            </span>
                                        </div>
                                    </div>
                                ` : `
                                    <div class="stat-block">
                                        <label>Prize Pool</label>
                                        <div class="value mono">${this.formatNumberCompact(pool)}</div>
                                    </div>
                                `}
                                <div class="stat-block">
                                    <label>Avg Chips</label>
                                    <div class="value mono">${this.formatNumberCompact(avgChips)}</div>
                                </div>
                                <div class="stat-block">
                                    <label>Avg BB</label>
                                    <div class="value mono">${avgBB}</div>
                                </div>
                            </div>

                            <div class="rail-timeline">
                                ${(() => {
                                    const breakPoints = this.getBreakPoints();
                                    const currentLevelNum = this.blindLevels[this.currentLevel].level;
                                    return this.blindLevels.map((l, i) => {
                                        const levelRow = `
                                            <div class="timeline-item ${i === this.currentLevel ? 'active' : ''} ${i < this.currentLevel ? 'past' : ''}">
                                                <div class="timeline-level mono">L${l.level}</div>
                                                <div class="timeline-blinds mono">${this.formatNumber(l.small)} / ${this.formatNumber(l.big)}</div>
                                            </div>`;
                                        const isRebuyClose = this.setupData.rebuyCloseLevel > 0 && l.level === this.setupData.rebuyCloseLevel;
                                        const rebuyCloseRow = isRebuyClose ? `
                                            <div class="timeline-rebuy-close ${currentLevelNum > this.setupData.rebuyCloseLevel ? 'past' : ''}">
                                                <span>Rebuys close</span>
                                                <span>after this level</span>
                                            </div>` : '';
                                        if (!breakPoints.has(l.level)) return levelRow + rebuyCloseRow;
                                        const isActiveBreak = this.isOnBreak && currentLevelNum === l.level;
                                        const isPastBreak = !this.isOnBreak && currentLevelNum > l.level;
                                        const breakRow = `
                                            <div class="timeline-break ${isActiveBreak ? 'break-active' : ''} ${isPastBreak ? 'break-past' : ''}">
                                                <span>Break</span>
                                                <span>${this.breakDuration} min</span>
                                            </div>`;
                                        return levelRow + rebuyCloseRow + breakRow;
                                    }).join('');
                                })()}
                            </div>
                        </div>

                        <div class="action-zone">
                            <div class="status-badge ${this.isOnBreak ? 'running' : this.isRunning ? 'running' : 'paused'}"
                                 style="${this.isOnBreak ? 'background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.25);color:#f59e0b;' : ''}">
                                <div class="status-indicator" style="${this.isOnBreak ? 'background:#f59e0b;' : ''}"></div>
                                ${this.isOnBreak ? 'Break' : this.isRunning ? 'Running' : 'Paused'}
                            </div>
                            
                            <div class="ticker-bar">
                                PRIZE POOL: ฿${this.formatNumberCompact(pool)} • ${this.getPayoutTickerContent()}
                            </div>

                            <div class="top-right-controls">
                                <div class="help-wrapper">
                                    <button class="top-right-btn" title="Keyboard Shortcuts">
                                        ${icons.HelpCircle}
                                    </button>
                                    <div class="shortcuts-tooltip">
                                        <h4>Keyboard Shortcuts</h4>
                                        <div class="shortcut-row"><span class="desc">Play / Pause</span><span class="key">SPACE</span></div>
                                        <div class="shortcut-row"><span class="desc">Previous Level</span><span class="key">←</span></div>
                                        <div class="shortcut-row"><span class="desc">Next Level</span><span class="key">→</span></div>
                                        <div class="shortcut-row"><span class="desc">Add 2 Minutes</span><span class="key">T</span></div>
                                        <div class="shortcut-row"><span class="desc">Eliminate Player</span><span class="key">⌫</span></div>
                                        <div class="shortcut-row"><span class="desc">Add Rebuy</span><span class="key">R</span></div>
                                        <div class="shortcut-row"><span class="desc">Open Menu</span><span class="key">ENTER</span></div>
                                        <div class="shortcut-row"><span class="desc">Fullscreen</span><span class="key">F</span></div>
                                    </div>
                                </div>
                                <button class="top-right-btn" onclick="app.toggleControlPanel()" title="Menu">
                                    ${icons.MoreVertical}
                                </button>
                            </div>

                            <div class="main-timer mono ${this.isOnBreak ? (!this.isRunning ? 'dim' : '') : (!this.isRunning ? 'dim' : (this.timeLeft < 60 && !this.isExtended ? 'critical' : ''))}"
                                 ${this.isOnBreak ? 'style="color:#f59e0b;"' : ''}>
                                ${this.isOnBreak ? this.formatTime(this.breakTimeLeft) :
                                  this.currentLevel === this.blindLevels.length - 1 ? '∞' :
                                  this.isExtended ? 'EXT' : this.formatTime(this.timeLeft)}
                            </div>

                            ${this.isOnBreak ? `
                                <div style="text-align:center;">
                                    <div style="font-size:2.5rem;font-weight:800;color:#f59e0b;letter-spacing:0.05em;">BREAK</div>
                                </div>
                            ` : `
                                <div class="main-blinds">
                                    <div class="blind-unit">
                                        <div class="val mono">${this.formatNumber(cur.small)}</div>
                                        <div class="lbl">Small Blind</div>
                                    </div>
                                    <div class="blind-sep">/</div>
                                    <div class="blind-unit">
                                        <div class="val mono">${this.formatNumber(cur.big)}</div>
                                        <div class="lbl">Big Blind</div>
                                    </div>
                                </div>
                            `}

                            <div class="progress-line ${!this.isOnBreak && this.timeLeft < 60 && !this.isExtended ? 'critical' : ''}"
                                 style="width:${this.isOnBreak
                                     ? (this.breakTotalTime > 0 ? ((this.breakTotalTime - this.breakTimeLeft) / this.breakTotalTime) * 100 : 0)
                                     : this.currentLevel === this.blindLevels.length - 1 ? 100 : pct}%"></div>
                        </div>
                    </div>
                    
                    ${this.clockActive ? `
                    <div class="clock-overlay">
                        <div id="clock-number" class="clock-number mono ${this.clockTimeLeft <= 3 ? 'clock-red' : this.clockTimeLeft <= 10 ? 'clock-amber' : 'clock-white'} ${this.clockTimeLeft <= 10 ? 'clock-pulse' : ''}">
                            ${this.clockTimeLeft}
                        </div>
                        <div class="clock-label">Clock</div>
                    </div>` : ''}

                    <div class="control-panel-overlay ${this.controlPanelOpen ? 'open' : ''}" onclick="app.toggleControlPanel()"></div>
                    <div class="control-panel ${this.controlPanelOpen ? 'open' : ''}">
                        <div class="control-panel-section">
                            <div class="control-panel-title">Timer Controls</div>
                            <div class="control-panel-buttons">
                                <button onclick="app.prevLevel()" ${this.currentLevel === 0 ? 'disabled' : ''} 
                                    class="btn btn-icon" title="Previous Level (←)">
                                    ${icons.SkipBack}
                                </button>
                                
                                <button onclick="app.toggleTimer()" ${this.currentLevel === this.blindLevels.length - 1 ? 'disabled' : ''} 
                                    class="btn btn-primary btn-large" title="Play/Pause (SPACE)">
                                    ${this.isRunning ? icons.Pause : icons.Play}
                                </button>
                                
                                <button onclick="app.nextLevel()" ${this.currentLevel === this.blindLevels.length - 1 ? 'disabled' : ''} 
                                    class="btn btn-icon" title="Next Level (→)">
                                    ${icons.SkipForward}
                                </button>
                                
                                <button onclick="app.addTwoMinutes()" ${this.currentLevel === this.blindLevels.length - 1 || this.isOnBreak ? 'disabled' : ''}
                                    class="btn btn-secondary" title="Add 2 minutes (T)">
                                    +2 min
                                </button>

                                <button onclick="app.toggleExtend()" ${this.currentLevel === this.blindLevels.length - 1 || this.isOnBreak ? 'disabled' : ''}
                                    class="btn ${this.isExtended ? 'btn-primary' : 'btn-secondary'}" title="Extend Level">
                                    ${this.isExtended ? 'Extended' : 'Extend'}
                                </button>
                            </div>
                        </div>
                        
                        <div class="control-panel-section">
                            <div class="control-panel-title">Player Controls</div>
                            <div class="control-panel-buttons">
                                <button onclick="app.eliminatePlayer()" ${this.playersRemaining <= 1 ? 'disabled' : ''}
                                    class="btn btn-secondary" title="Eliminate Player (BACKSPACE)">
                                    ${icons.Minus} OUT
                                </button>
                                <button onclick="app.addPlayer()"
                                    ${(this.activePlayers.length > 0 ? !this.lastEliminated : this.playersRemaining >= this.setupData.totalPlayers) ? 'disabled' : ''}
                                    class="btn btn-icon" title="Undo elimination">
                                    ${icons.RotateCcw}
                                </button>
                                <div class="control-panel-divider"></div>
                                <button onclick="app.lateRegPlayer()"
                                    class="btn btn-secondary" title="Late Registration">
                                    ${icons.Plus} Late Reg
                                </button>
                                
                                ${this.setupData.rebuyCloseLevel > 0 ? `
                                    <div class="control-panel-divider"></div>
                                    
                                    <button onclick="app.addRebuy()" ${!this.areRebuysOpen() ? 'disabled' : ''} 
                                        class="btn btn-primary" title="Add Rebuy (R)">
                                        ${icons.Plus} Rebuy
                                    </button>
                                    <button onclick="app.undoRebuy()" ${!this.areRebuysOpen() || this.rebuys === 0 ? 'disabled' : ''} 
                                        class="btn btn-icon" title="Cancel last rebuy">
                                        ${icons.RotateCcw}
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                        
                        <div class="control-panel-section">
                            <div class="control-panel-title">Settings</div>
                            <div class="control-panel-buttons">
                                <button onclick="app.toggleSound()" class="btn btn-secondary" title="Toggle Sound">
                                    ${this.soundEnabled ? icons.Volume2 : icons.VolumeX}
                                </button>
                                
                                <button onclick="app.testSound()" class="btn btn-secondary" title="Test Sound Alert">
                                    ${icons.Volume2} Test
                                </button>
                                
                                <button onclick="app.toggleFullscreen()" class="btn btn-secondary" title="Fullscreen (F)">
                                    ${this.isFullscreen ? icons.Minimize : icons.Maximize}
                                </button>
                                
                                <button onclick="app.showRedrawSeating()" class="btn btn-secondary" title="Redraw Table Seating" ${this.activePlayers.length === 0 && this.originalPlayerNames.length === 0 ? 'disabled' : ''}>
                                    ${icons.Shuffle} Redraw
                                </button>
                                
                                <button onclick="app.showSettingsMenu()" class="btn btn-secondary">
                                    ${icons.Settings} Setup
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderRedrawSeating() {
                if (this.redrawResult) {
                    return this.renderRedrawResult();
                }

                const pool = this.getRedrawPool();
                const usingActive = this.activePlayers.length > 0;
                const selectedCount = this.redrawSelections.filter(s => s).length;
                const canRedraw = selectedCount === this.playersRemaining;

                return `
                    <div class="modal-wrapper">
                        <div class="setup-content">
                            <div class="setup-header">
                                <h1 class="setup-title">${this.redrawTableCount === 1 ? 'FINAL TABLE DRAW' : 'TABLE REDRAW'}</h1>
                                <p class="setup-subtitle">${usingActive ? 'All remaining players are pre-selected' : 'Select players still in the tournament'}</p>
                            </div>

                            <div class="setup-card">
                                <div class="setup-group">
                                    <label class="setup-label">Redraw to</label>
                                    <div style="display: flex; gap: 0.25rem; background: rgba(0,0,0,0.4); border-radius: 0.375rem; padding: 0.25rem; max-width: 200px; margin: 0 auto;">
                                        <button onclick="app.setRedrawTableCount(1)"
                                            style="flex:1;padding:0.4rem 0;border-radius:0.25rem;border:none;cursor:pointer;font-size:0.8rem;font-family:var(--font-ui);
                                                   background:${this.redrawTableCount===1?'var(--accent-color)':'transparent'};
                                                   color:${this.redrawTableCount===1?'#fff':'var(--text-dim)'};">
                                            1 Table
                                        </button>
                                        <button onclick="app.setRedrawTableCount(2)"
                                            style="flex:1;padding:0.4rem 0;border-radius:0.25rem;border:none;cursor:pointer;font-size:0.8rem;font-family:var(--font-ui);
                                                   background:${this.redrawTableCount===2?'var(--accent-color)':'transparent'};
                                                   color:${this.redrawTableCount===2?'#fff':'var(--text-dim)'};">
                                            2 Tables
                                        </button>
                                    </div>
                                </div>

                                <div class="setup-group">
                                    <label class="setup-label">
                                        Players (${selectedCount} selected, ${this.playersRemaining} remaining)
                                    </label>
                                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                                        ${pool.map((name, index) => `
                                            <div style="display: flex; align-items: center; gap: 0.75rem; background: ${this.redrawSelections[index] ? 'rgba(16, 185, 129, 0.1)' : 'rgba(0, 0, 0, 0.3)'}; border-radius: 0.375rem; padding: 0.75rem; border: 1px solid ${this.redrawSelections[index] ? 'rgba(16, 185, 129, 0.3)' : '#333'}; cursor: pointer; transition: all 0.2s;" onclick="app.togglePlayerForRedraw(${index})">
                                                <input
                                                    type="checkbox"
                                                    ${this.redrawSelections[index] ? 'checked' : ''}
                                                    style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--success-color);"
                                                    onclick="event.stopPropagation(); app.togglePlayerForRedraw(${index})"
                                                >
                                                <span style="font-size: 0.9rem; font-weight: 500; color: ${this.redrawSelections[index] ? 'var(--text-main)' : 'var(--text-dim)'};">
                                                    ${name}
                                                </span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>

                                </div>

                                <button onclick="app.performRedraw()" class="btn btn-primary" style="width: 100%; padding: 1rem;" ${!canRedraw ? 'disabled' : ''}>
                                    ${icons.Shuffle} ${this.redrawTableCount === 1 ? 'Draw Final Table' : 'Redraw Tables'}
                                </button>
                                ${!canRedraw && selectedCount > 0 ? `
                                    <div style="text-align: center; color: var(--danger-color); font-size: 0.75rem; margin-top: 0.75rem;">
                                        Select exactly ${this.playersRemaining} players to match current player count
                                    </div>
                                ` : ''}
                            </div>

                            <button onclick="app.cancelRedraw()" class="btn btn-secondary" style="width: 100%; padding: 0.75rem; margin-top: 1rem;">
                                Cancel
                            </button>
                        </div>
                    </div>
                `;
            }

            renderRedrawResult() {
                const tableCount = this.redrawResult.length;
                const gridCols   = tableCount === 1 ? '1fr' : '1fr 1fr';
                const maxW       = tableCount === 1 ? '600px' : '900px';
                const title      = tableCount === 1 ? 'FINAL TABLE ASSIGNMENT' : 'TABLE REDRAW';

                return `
                    <div class="modal-wrapper">
                        <div class="setup-content" style="max-width:${maxW};">
                            <div class="setup-header">
                                <h1 class="setup-title">${title}</h1>
                                <p class="setup-subtitle">Players have been randomly assigned to seats</p>
                            </div>

                            <div style="display:grid;grid-template-columns:${gridCols};gap:2rem;">
                                ${this.redrawResult.map(table => `
                                    <div class="setup-card">
                                        <h2 style="text-align:center;font-size:1.5rem;font-weight:600;margin-bottom:1.5rem;">
                                            ${table.name}
                                        </h2>
                                        <div style="display:flex;flex-direction:column;gap:0.75rem;">
                                            ${table.players.map((player, index) => {
                                                const position = this.getPositionLabel(index);
                                                return `
                                                    <div style="display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.03);border-radius:0.375rem;padding:0.75rem 1rem;border:1px solid #333;">
                                                        <div style="display:flex;align-items:center;gap:0.75rem;">
                                                            <span class="mono dim" style="font-size:0.75rem;width:32px;">#${index + 1}</span>
                                                            <span style="font-size:1rem;font-weight:500;">${player}</span>
                                                        </div>
                                                        ${position ? `
                                                            <span style="background:rgba(255,255,255,0.1);padding:0.25rem 0.75rem;border-radius:0.25rem;font-size:0.75rem;font-weight:600;color:var(--text-dim);">
                                                                ${position}
                                                            </span>
                                                        ` : ''}
                                                    </div>`;
                                            }).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <button onclick="app.closeRedrawResult()" class="btn btn-primary" style="width:100%;padding:1rem;margin-top:2rem;">
                                Done
                            </button>
                        </div>
                    </div>
                `;
            }

            renderShuffleAnimation() {
                const slotsToShow = Math.min(this.shuffleNames.length, 10);
                const initialShuffle = this.shuffleArray([...this.shuffleNames]);
                
                return `
                    <div class="shuffle-overlay">

            // ===== LATE REGISTRATION =====

            lateRegPlayer() {
                // Seed counts: if playerTableMap is populated, derive from actual current seating;
                // otherwise fall back to an even split
                if (Object.keys(this.playerTableMap).length > 0) {
                    this.recomputeTableCounts();
                } else if (Object.keys(this.lateRegTableCounts).length === 0) {
                    const base = Math.floor(this.playersRemaining / this.tableCount);
                    const extra = this.playersRemaining % this.tableCount;
                    if (this.tableCount >= 1) this.lateRegTableCounts.pokerTable   = base + (extra >= 1 ? 1 : 0);
                    if (this.tableCount >= 2) this.lateRegTableCounts.kitchenTable = base + (extra >= 2 ? 1 : 0);
                    if (this.tableCount >= 3) this.lateRegTableCounts.poolTable    = base;
                }
                this.lateRegStep = 'setup';
                this.lateRegDraw = null;
                this.lateRegName = '';
                this.showLateReg = true;
                this.controlPanelOpen = false;
                this.render();
            }

            setLateRegName(value) {
                this.lateRegName = value.trim();
            }

            adjustLateRegCount(key, delta) {
                this.lateRegTableCounts[key] = Math.max(0, (this.lateRegTableCounts[key] || 0) + delta);
                this.render();
            }

            confirmLateRegDraw() {
                // Find the table(s) with the fewest players — assign to one of them randomly
                const tableKeys = this.tableCount === 1
                    ? ['pokerTable']
                    : this.tableCount === 2
                        ? ['pokerTable', 'kitchenTable']
                        : ['pokerTable', 'kitchenTable', 'poolTable'];
                const tableNames = { pokerTable: 'Poker Table', kitchenTable: 'Kitchen Table', poolTable: 'Pool Table' };

                const minCount = Math.min(...tableKeys.map(k => this.lateRegTableCounts[k] || 0));
                const candidates = tableKeys.filter(k => (this.lateRegTableCounts[k] || 0) === minCount);
                const chosenKey = candidates[Math.floor(Math.random() * candidates.length)];
                const tableSize = this.lateRegTableCounts[chosenKey] || 0;
                // Update counts and player totals
                this.lateRegTableCounts[chosenKey] = tableSize + 1;
                this.setupData.totalPlayers++;
                this.playersRemaining++;
                this.lateRegCount++;

                // Add to redraw pool so they appear in future reseats
                const name = this.lateRegName || `Late Reg ${this.lateRegCount}`;
                this.originalPlayerNames.push(name);
                this.redrawSelections.push(false);
                // Track in active players + table map if named mode is active
                if (this.activePlayers.length > 0 || this.originalPlayerNames.length > 0) {
                    this.activePlayers.push(name);
                    this.playerTableMap[name] = chosenKey;
                }

                this.lateRegDraw = { table: tableNames[chosenKey], name };
                this.lateRegStep = 'result';
                this.render();
            }

            closeLateReg() {
                this.showLateReg = false;
                this.lateRegDraw = null;
                this.render();
            }

            renderLateRegModal() {

                        ? ['pokerTable', 'kitchenTable']
                        : ['pokerTable', 'kitchenTable', 'poolTable'];

                return `

                                <input
                                    type="text"
                                    class="setup-input"
                                    placeholder="Enter name…"
                                    value="${this.lateRegName}"
                                    oninput="app.setLateRegName(this.value)"

                                ${tableKeys.map(key => `
                                    <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">

                                            <button class="btn btn-icon" style="width:1.75rem;height:1.75rem;" onclick="app.adjustLateRegCount('${key}', -1)">−</button>
                                            <span class="mono" style="font-size:1rem;min-width:1.5rem;text-align:center;">${this.lateRegTableCounts[key] || 0}</span>
                                            <button class="btn btn-icon" style="width:1.75rem;height:1.75rem;" onclick="app.adjustLateRegCount('${key}', 1)">+</button>
                                        </div>

                            </div>
                            <div style="text-align:center;font-size:0.8rem;margin-bottom:1rem;${totalOk ? 'color:var(--text-dim);' : 'color:#ef4444;font-weight:600;'}">

                            <button onclick="app.confirmLateRegDraw()" class="btn btn-primary" style="width:100%;padding:0.75rem;" ${canAssign ? '' : 'disabled'}>

                            <button onclick="app.closeLateReg()" class="btn btn-secondary" style="width:100%;padding:0.6rem;margin-top:0.5rem;">
