<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Risithai Poker">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Risithai%20Poker%20Tour%22%2C%22short_name%22%3A%22Risithai%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%7D">
    <title>Risithai Tournament Timer</title>
    <script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;800&display=swap" rel="stylesheet">
    <style>
        /* ===== THEME: MONOLITH ===== */
        :root {
            --bg-root: #000000;
            --bg-rail: #0a0a0a;
            --bg-active: #121212;
            
            --text-main: #ffffff;
            --text-dim: #999999;
            --text-accent: #ffffff;
            
            --accent-color: #3b82f6;
            --danger-color: #ef4444;
            --success-color: #10b981;
            
            --border: 1px solid #1a1a1a;
            
            --font-ui: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            color-scheme: dark;
            touch-action: manipulation;
        }
        
        body {
            background: var(--bg-root);
            color: var(--text-main);
            font-family: var(--font-ui);
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            overscroll-behavior: none;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ===== UTILITIES ===== */
        .mono { font-family: var(--font-mono); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
        .dim { color: var(--text-dim); }
        .hidden { display: none !important; }

        /* ===== LAYOUT: SPLIT SCREEN ===== */
        .split-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- LEFT RAIL (DATA) --- */
        .rail {
            width: 350px;
            background: var(--bg-rail);
            border-right: var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .rail-header {
            padding: 2rem;
            border-bottom: var(--border);
        }

        .rail-stats {
            padding: 2rem;
            border-bottom: var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .stat-block label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 0.25rem;
        }
        .stat-block .value {
            font-size: 1.25rem;
            font-weight: 500;
        }

        .rail-timeline {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        .rail-timeline::-webkit-scrollbar { width: 0px; }

        .timeline-item {
            display: flex;
            padding: 1rem 2rem;
            border-bottom: 1px solid #111;
            color: var(--text-dim);
            transition: all 0.3s ease;
        }

        .timeline-item.active {
            background: var(--bg-active);
            color: var(--text-main);
            border-left: 3px solid var(--text-main);
            padding-left: calc(2rem - 3px);
        }

        .timeline-item.past {
            opacity: 0.3;
        }

        .timeline-level { width: 40px; font-size: 0.8rem; opacity: 0.5; }
        .timeline-blinds { flex: 1; font-weight: 500; text-align: right; }

        .timeline-break {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 2rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-dim);
            opacity: 0.4;
            border-bottom: 1px solid #0d0d0d;
        }
        .timeline-break.break-active {
            color: #f59e0b;
            border-left: 3px solid #f59e0b;
            padding-left: calc(2rem - 3px);
            opacity: 1;
            background: rgba(245, 158, 11, 0.04);
        }
        .timeline-break.break-past { opacity: 0.15; }

        .timeline-rebuy-close {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 2rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--danger-color);
            border-left: 2px solid var(--danger-color);
            border-bottom: 1px solid rgba(239, 68, 68, 0.1);
            background: rgba(239, 68, 68, 0.04);
            opacity: 0.75;
        }
        .timeline-rebuy-close.past { opacity: 0.2; background: none; border-left-color: transparent; }

        /* --- RIGHT ZONE (ACTION) --- */
        .action-zone {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .ticker-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            font-size: 1rem;
            color: #bbbbbb;
            border-bottom: var(--border);
            text-align: right;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .main-timer {
            font-size: 20vw;
            line-height: 0.9;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 3rem;
            font-variant-numeric: tabular-nums;
            transform: translateY(5vh);
        }

        .main-timer.critical { color: var(--danger-color); }

        .main-blinds {
            display: flex;
            align-items: baseline;
            gap: 2rem;
            padding: 2.5rem 4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6),
                        0 2px 8px rgba(255, 255, 255, 0.05) inset;
            transform: translateY(5vh);
        }

        .blind-unit {
            text-align: center;
        }
        
        .blind-unit .val {
            font-size: 4rem;
            font-weight: 500;
            line-height: 1;
        }
        
        .blind-unit .lbl {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 0.5rem;
            letter-spacing: 0.2em;
        }

        .blind-sep {
            font-size: 4rem;
            color: #444444;
            font-weight: 300;
        }

        .progress-line {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 12px;
            background: var(--text-main);
            transition: width 1s linear;
        }
        
        .progress-line.critical {
            background: var(--danger-color);
        }
        
        /* ===== STATUS BADGE ===== */
        .status-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid;
        }
        
        .status-badge.running {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--success-color);
            color: var(--success-color);
        }
        
        .status-badge.paused {
            background: rgba(255, 255, 255, 0.1);
            border-color: #666;
            color: #999;
        }
        
        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== CLOCK OVERLAY ===== */
        .clock-overlay {
            position: fixed;
            inset: 0;
            z-index: 110;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        .clock-number {
            font-family: var(--font-mono);
            font-size: 38vw;
            font-weight: 800;
            line-height: 0.85;
            letter-spacing: -0.05em;
            font-variant-numeric: tabular-nums;
            transition: color 0.4s ease;
        }

        .clock-number.clock-white  { color: #ffffff; }
        .clock-number.clock-amber  { color: #f59e0b; }
        .clock-number.clock-red    { color: #ef4444; }

        @keyframes clock-pulse {
            0%, 100% { transform: scale(1);   opacity: 1;   }
            50%       { transform: scale(1.06); opacity: 0.85; }
        }

        .clock-number.clock-pulse {
            animation: clock-pulse 0.7s ease-in-out infinite;
        }

        .clock-label {
            font-family: var(--font-ui);
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
        }

        /* ===== CONTROL PANEL (FLOATING) ===== */
        .control-panel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 98;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .control-panel-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        
        .control-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--bg-rail);
            border: 1px solid #ffffff;
            border-radius: 0.75rem;
            padding: 2.5rem 3rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 99;
            max-height: 85vh;
            max-width: 90vw;
            min-width: 600px;
            overflow-y: auto;
        }
        
        .control-panel.open {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        /* ===== TOP-RIGHT CONTROLS ===== */
        .top-right-controls {
            position: absolute;
            top: 3.5rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 10;
        }
        
        .top-right-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border: none;
            border-radius: 0.25rem;
            background: transparent;
            color: #555;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
        }
        
        .top-right-btn:hover {
            color: #aaa;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .help-wrapper {
            position: relative;
        }
        
        .shortcuts-tooltip {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 0.5rem;
            padding: 1rem 1.25rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: all 0.2s;
            z-index: 50;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        
        .help-wrapper:hover .shortcuts-tooltip {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        
        .shortcuts-tooltip h4 {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 0.75rem;
        }
        
        .shortcut-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            padding: 0.3rem 0;
            font-size: 0.8rem;
        }
        
        .shortcut-row .key {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #444;
            border-radius: 0.25rem;
            padding: 0.15rem 0.5rem;
            color: #aaa;
        }
        
        .shortcut-row .desc {
            color: #888;
        }
        
        .control-panel-section {
            margin-bottom: 2.5rem;
        }
        
        .control-panel-section:last-child {
            margin-bottom: 0;
        }
        
        .control-panel-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.25rem;
            text-align: center;
        }
        
        .control-panel-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        /* Scale up everything inside control panel */
        .control-panel .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
        }
        
        .control-panel .btn svg {
            width: 24px;
            height: 24px;
        }
        
        .control-panel .btn-icon {
            width: 3.25rem;
            height: 3.25rem;
            padding: 0;
        }
        
        .control-panel .btn-large {
            width: 4rem;
            height: 4rem;
        }
        
        .control-panel .btn-large svg {
            width: 28px;
            height: 28px;
        }
        
        .control-panel-divider {
            width: 2px;
            height: 44px;
            background: linear-gradient(180deg, transparent, #333, transparent);
            align-self: center;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid #333;
            border-radius: 0.375rem;
            font-family: var(--font-ui);
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-main);
        }
        
        .btn svg {
            flex-shrink: 0;
        }
        
        .btn-primary svg {
            color: #000;
            stroke: #000;
        }
        
        .btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }
        
        .btn:not(:disabled):hover {
            border-color: #fff;
            background: #111;
        }
        
        .btn:not(:disabled):active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
        
        .btn-primary:not(:disabled):hover {
            background: #ddd;
            border-color: #ddd;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid #333;
            color: #fff;
        }
        
        .btn-icon {
            width: 2.5rem;
            height: 2.5rem;
            padding: 0;
            border-radius: 50%;
        }
        
        .btn-large {
            width: 3rem;
            height: 3rem;
        }

        /* ===== SETUP SCREENS / MODALS ===== */
        .modal-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-root);
            z-index: 100;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .setup-content {
            width: 100%;
            max-width: 600px;
            margin-top: 5vh;
        }

        .setup-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .setup-title {
            font-weight: 300;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .setup-subtitle {
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        
        .setup-card {
            background: rgba(255, 255, 255, 0.02);
            border: var(--border);
            border-radius: 0.5rem;
            padding: 2rem;
        }
        
        .setup-group {
            margin-bottom: 2rem;
        }
        
        .setup-group:last-child {
            margin-bottom: 0;
        }
        
        .setup-label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .setup-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }
        
        .setup-value {
            font-size: 2rem;
            font-family: var(--font-mono);
            min-width: 120px;
            text-align: center;
        }
        
        .setup-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-size: 0.9rem;
            font-family: var(--font-mono);
            text-align: center;
            width: 100%;
            -webkit-user-select: text;
            user-select: text;
        }
        
        .setup-input:focus {
            outline: none;
            border-color: #666;
        }
        
        /* Always show number input spinner arrows */
        .setup-input[type="number"]::-webkit-inner-spin-button,
        .setup-input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
            height: auto;
        }
        
        .setup-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
            color: var(--text-main);
            font-size: 0.9rem;
            font-family: var(--font-mono);
            min-width: 150px;
        }
        
        .setup-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .setup-info {
            background: rgba(255, 255, 255, 0.03);
            border: var(--border);
            border-radius: 0.375rem;
            padding: 1rem;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        
        .flex-1 { flex: 1; }

        /* ===== SHUFFLE ANIMATION ===== */
        .shuffle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .shuffle-slots {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 2rem;
            border-radius: 0.5rem;
            border: 2px solid #fff;
            min-width: 300px;
        }
        
        .shuffle-slot {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            border: 1px solid #333;
        }
        
        .shuffle-slot-number {
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            width: 32px;
        }
        
        .shuffle-slot-name {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
        }
        
        .shuffle-slot-name.spinning {
            animation: slot-spin 0.1s ease-in-out;
        }

        /* ===== CONFETTI ===== */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 9999;
        }

        /* ===== MODAL/WARNING ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--bg-rail);
            border: var(--border);
            border-radius: 0.5rem;
            padding: 2rem;
            max-width: 400px;
            margin: 1rem;
        }
        
        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-main);
        }
        
        .modal-text {
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .modal-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes slot-spin {
            0% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-10px); opacity: 0.5; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .split-layout { flex-direction: column-reverse; }
            .rail { width: 100%; height: 30%; border-right: none; border-top: var(--border); }
            .action-zone { height: 70%; padding: 2rem; }
            .main-timer { font-size: 25vw; }
            .rail-stats { display: none; }
        }

        /* ===== REMOTE CONTROL ===== */
        .remote-layout {
            display: flex;
            flex-direction: column;
            /* 100dvh = dynamic viewport height: adjusts for iOS address bar */
            height: 100vh;
            height: 100dvh;
            background: #000;
            color: #fff;
            font-family: var(--font-ui);
            overflow: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        /* Base transition for remote buttons — includes transform so release animates smoothly */
        .remote-layout button {

this.blindLevels = [

            setupKeyboardShortcuts() {
                document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
                    
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (!this.showSetup && !this.showPayouts && !this.showSeating && !this.showRedraw && this.currentLevel < this.blindLevels.length - 1) {
                            this.toggleTimer();
                        }
                    }
                    
                    if (e.code === 'Backspace') {
                        e.preventDefault();
                        if (!this.showSetup && !this.showPayouts && !this.showSeating && !this.showRedraw) {
                            this.eliminatePlayer();
                        }
                    }
                    
                    if (e.code === 'ArrowLeft') {
                        e.preventDefault();
                        if (!this.showSetup && !this.showPayouts && !this.showSeating && !this.showRedraw) {
                            this.prevLevel();
                        }
                    }
                    
                    if (e.code === 'ArrowRight') {
                        e.preventDefault();
                        if (!this.showSetup && !this.showPayouts && !this.showSeating && !this.showRedraw) {
                            this.nextLevel();
                        }
                    }
                    
                    if (e.code === 'KeyF') {
                        e.preventDefault();
                        this.toggleFullscreen();
                    }
                    
                    if (e.code === 'KeyT') {
                        e.preventDefault();
                        if (!this.showSetup && !this.showPayouts && !this.showSeating && !this.showRedraw && !this.isOnBreak && this.currentLevel < this.blindLevels.length - 1) {
                            this.addTwoMinutes();
                        }
                    }
                    
                    if (e.code === 'Enter') {
                        e.preventDefault();
                        if (!this.showSetup && !this.showPayouts && !this.showSeating && !this.showRedraw) {
                            this.toggleControlPanel();
                        }
                    }
                    
                    if (e.code === 'KeyR') {
                        e.preventDefault();
                        if (!this.showSetup && !this.showPayouts && !this.showSeating && !this.showRedraw) {
                            this.addRebuy();
                        }
                    }
                });
            }

            setupFullscreenListener() {
                document.addEventListener('fullscreenchange', () => {
                    this.isFullscreen = !!document.fullscreenElement;
                    // Update just the fullscreen button icon in control panel
                    const settingsSection = document.querySelector('.control-panel-section:last-child .control-panel-buttons');
                    if (settingsSection) {
                        const fsBtn = settingsSection.querySelector('button:nth-child(3)');
                        if (fsBtn) fsBtn.innerHTML = this.isFullscreen ? icons.Minimize : icons.Maximize;
                    }
                });
            }
            
            setupTimelineScrollListener() {
                // Use event delegation since timeline is re-rendered
                document.addEventListener('scroll', (e) => {
                    const timeline = e.target.closest('.rail-timeline');
                    if (timeline) {
                        // User is manually scrolling
                        this.userIsScrolling = true;
                        
                        // Clear existing timeout
                        if (this.userScrollTimeout) {
                            clearTimeout(this.userScrollTimeout);
                        }
                        
                        // Reset flag after 2 seconds of no scrolling
                        this.userScrollTimeout = setTimeout(() => {
                            this.userIsScrolling = false;
                        }, 2000);
                    }
                }, true); // Use capture phase to catch scroll events
            }

            toggleFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.log('Fullscreen error:', err);
                    });
                } else {
                    document.exitFullscreen();
                }
            }

            startTimer() {
                if (this.timerInterval) clearInterval(this.timerInterval);
                
                this.timerInterval = setInterval(() => {
                    // Break countdown takes priority
                    if (this.isOnBreak) {
                        if (this.isRunning && this.breakTimeLeft > 0) {
                            this.breakTimeLeft--;
                            this.updateBreakDisplay();
                        } else if (this.isRunning && this.breakTimeLeft === 0) {
                            this.endBreak();
                        }
                        this.publishState(); // always broadcast, even if paused on break
                        return;
                    }

                    const isLastLevel = this.currentLevel === this.blindLevels.length - 1;

                    // Always broadcast current state so remotes get it even when paused
                    this.publishState();

                    if (this.isRunning && this.timeLeft > 0 && !isLastLevel) {
                        this.timeLeft--;

                        if (this.timeLeft === 60 && !this.isExtended) {
                            this.playWarningSound();
                        }
                        if (this.timeLeft === 2 && !this.isExtended) {
                            this.playLevelEndSound();
                        }

                        this.updateTimerDisplay();
                        this.publishState();
                    } else if (this.timeLeft === 0 && this.isRunning && !this.isExtended && !isLastLevel) {
                        if (this.currentLevel < this.blindLevels.length - 1) {
                            const completedLevelNum = this.blindLevels[this.currentLevel].level;
                            if (this.breaksEnabled && completedLevelNum % this.breakFrequency === 0) {
                                this.startBreak();
                            } else {
                                this.currentLevel++;

                                // Apply variable level length
                                const effectiveDuration = this.getEffectiveLevelDuration();
                                if (this.levelLengthMode === 'levels' && this.variableLevelLength) {
                                    this.activeLevelDuration = effectiveDuration;
                                } else if (this.activeLevelDuration === null || effectiveDuration < this.activeLevelDuration) {
                                    this.activeLevelDuration = effectiveDuration;
                                }
                                this.totalTime = this.activeLevelDuration * 60;
                                this.timeLeft = this.totalTime;

                                this.isExtended = false;
                                this.userIsScrolling = false;
                                this.checkSurvivorBonus();
                                this.render();
                                this.scrollToCurrentLevel();
                            }
                        } else {
                            this.isRunning = false;
                            this.render();
                        }
                    }
                }, 1000);
            }

            // Lightweight timer-only DOM update — no innerHTML rebuild
            updateTimerDisplay() {
                const timerEl = document.querySelector('.main-timer');
                const progressEl = document.querySelector('.progress-line');
                if (!timerEl || !progressEl) return;
                
                const isLastLevel = this.currentLevel === this.blindLevels.length - 1;
                const timeStr = isLastLevel ? '∞' : (this.isExtended ? 'EXT' : this.formatTime(this.timeLeft));
                
                timerEl.textContent = timeStr;
                
                // Update critical/dim classes
                timerEl.classList.toggle('dim', !this.isRunning);
                timerEl.classList.toggle('critical', this.isRunning && this.timeLeft < 60 && !this.isExtended);
                
                // Update progress bar
                const pct = isLastLevel ? 100 : ((this.totalTime - this.timeLeft) / this.totalTime) * 100;
                progressEl.style.width = pct + '%';
                progressEl.classList.toggle('critical', this.timeLeft < 60 && !this.isExtended);
            }

            // Update just the stats section in the rail (players, rebuys, avg chips, avg BB)

                const cur = this.blindLevels[this.currentLevel];
                const grossPool = (this.setupData.totalPlayers * this.setupData.buyIn) + (this.rebuys * this.setupData.buyIn);
                const pool = grossPool - this.tournamentFee;
                const totalChipsInPlay = (this.setupData.totalPlayers * this.setupData.startingStack) + (this.rebuys * this.setupData.startingStack) + this.survivorBonusTotal;
                const avgChips = Math.round(totalChipsInPlay / this.playersRemaining);
                const rawBB = avgChips / cur.big;
                const avgBB = rawBB.toFixed(rawBB >= 10 ? 0 : 1);

                const statsEl = document.querySelector('.rail-stats');
                if (!statsEl) return;

                const values = statsEl.querySelectorAll('.stat-block .value');
                if (values[0]) values[0].textContent = `${this.playersRemaining}/${this.setupData.totalPlayers}`;

                // Second stat block depends on whether rebuys are enabled
                if (this.setupData.rebuyCloseLevel > 0) {
                    const rebuyVal = statsEl.querySelector('.stat-block:nth-child(2) .value.mono');
                    if (rebuyVal) rebuyVal.textContent = this.rebuys;
                } else {
                    if (values[1]) values[1].textContent = this.formatNumberCompact(pool);
                }

                if (values[2]) values[2].textContent = this.formatNumberCompact(avgChips);
                if (values[3]) values[3].textContent = avgBB;

                // Update ticker bar
                const ticker = document.querySelector('.ticker-bar');
                if (ticker) {
                    ticker.textContent = `PRIZE POOL: ฿${this.formatNumberCompact(pool)} • ${this.getPayoutTickerContent()}`;
                }

                // Sync control-panel button disabled states (they aren't re-rendered by updateStats)
                const btnEliminate = document.querySelector('[onclick="app.eliminatePlayer()"]');
                if (btnEliminate) btnEliminate.disabled = this.playersRemaining <= 1;

                const btnAddPlayer = document.querySelector('[onclick="app.addPlayer()"]');
                if (btnAddPlayer) btnAddPlayer.disabled = this.activePlayers.length > 0
                    ? !this.lastEliminated
                    : this.playersRemaining >= this.setupData.totalPlayers;

                const btnAddRebuy = document.querySelector('[onclick="app.addRebuy()"]');
                if (btnAddRebuy) btnAddRebuy.disabled = !this.areRebuysOpen();

                const btnUndoRebuy = document.querySelector('[onclick="app.undoRebuy()"]');
                if (btnUndoRebuy) btnUndoRebuy.disabled = !this.areRebuysOpen() || this.rebuys === 0;
            }

            // ===== REMOTE PRESS ANIMATION =====

            setupRemotePressAnimation() {
                const press = e => {
                    const btn = e.target.closest('button');
                    if (btn && !btn.disabled) btn.classList.add('r-pressed');
                };
                const release = () => {
                    document.querySelectorAll('.r-pressed')
                        .forEach(el => el.classList.remove('r-pressed'));
                };
                document.addEventListener('touchstart',  press,   { passive: true });
                document.addEventListener('touchend',    release, { passive: true });
                document.addEventListener('touchcancel', release, { passive: true });
            }

            // ===== ABLY REMOTE CONTROL =====

            initAbly() {
                if (!window.Ably) return;
                try {
                    const client = new Ably.Realtime({ key: ABLY_KEY });
                    const channel = client.channels.get(`risithai-${this.roomCode}`);
                    this.ablyChannel = channel;

                    client.connection.on('connected', () => {
                        this.ablyConnected = true;
                        if (this.isRemote) this.renderRemoteUpdate();
                        else this.renderRoomCode();
                    });
                    client.connection.on('disconnected', () => {
                        this.ablyConnected = false;
                        if (this.isRemote) this.renderRemoteUpdate();
                        else this.renderRoomCode();
                    });
                    client.connection.on('failed', () => {
                        this.ablyConnected = false;
                        if (this.isRemote) this.renderRemoteUpdate();
                    });

                    if (this.isRemote) {
                        channel.subscribe('state', (msg) => {
                            try {
                                this.remoteState = msg.data;
                                this.renderRemoteUpdate();
                            } catch(e) { console.error('state handler error:', e); }
                        });
                    } else {
                        channel.subscribe('cmd', (msg) => {
                            try { this.executeRemoteCommand(msg.data); }
                            catch(e) { console.error('cmd handler error:', e); }
                        });
                    }
                } catch(e) { console.warn('Ably init failed:', e); }
            }

            publishState() {
                if (!this.ablyChannel || this.isRemote || this.showSetup) return;
                try {
                    const cur = this.blindLevels[this.currentLevel];
                    this.ablyChannel.publish('state', {
                        levelNum:        cur.level,
                        small:           cur.small,
                        big:             cur.big,
                        timeLeft:        this.timeLeft,
                        totalTime:       this.totalTime,
                        isRunning:       this.isRunning,
                        isOnBreak:       this.isOnBreak,
                        breakTimeLeft:   this.breakTimeLeft,
                        playersRemaining: this.playersRemaining,
                        totalPlayers:    this.setupData.totalPlayers,
                        rebuys:          this.rebuys,
                        areRebuysOpen:   this.areRebuysOpen(),
                        isExtended:      this.isExtended,
                        // For remote late-reg / redraw / eliminate flows
                        tableCount:          this.tableCount,
                        lateRegTableCounts:  {...this.lateRegTableCounts},
                        originalPlayerNames: [...this.originalPlayerNames],
                        activePlayers:       [...this.activePlayers],
                        lastEliminatedName:  this.lastEliminated ? this.lastEliminated.name : null,
                        lateRegDraw:         this.lateRegDraw,
                        redrawResult:        this.redrawResult,
                        clockActive:         this.clockActive,
                        clockTimeLeft:       this.clockTimeLeft,
                    });
                } catch(e) {}
            }

            sendCommand(cmd) {
                if (!this.ablyChannel) return;
                try { this.ablyChannel.publish('cmd', cmd); } catch(e) {}
            }

            executeRemoteCommand(cmd) {
                // ── Object commands (phone flows) ─────────────────────────
                if (cmd && typeof cmd === 'object' && cmd.type) {
                    if (cmd.type === 'confirmEliminate') {
                        // Phone selected who is out
                        const name = cmd.name;
                        if (name && this.activePlayers.includes(name)) {
                            this.lastEliminated = { name, table: this.playerTableMap[name] || null };
                            this.activePlayers = this.activePlayers.filter(p => p !== name);
                            delete this.playerTableMap[name];
                            this.playersRemaining = this.activePlayers.length;
                            if (this.playersRemaining === 1) this.createConfetti();
                            this.playEliminationSound();
                            this.recomputeTableCounts();
                            this.updateStats();
                            this.publishState();
                        } else if (!name && this.playersRemaining > 1) {
                            // Anonymous fallback (no named players)
                            this.playersRemaining--;
                            if (this.playersRemaining === 1) this.createConfetti();
                            this.playEliminationSound();
                            this.updateStats();
                            this.publishState();
                        }
                        return;
                    }
                    if (cmd.type === 'undoEliminate') {
                        if (this.lastEliminated) {
                            const { name, table } = this.lastEliminated;
                            this.activePlayers.push(name);
                            if (table) this.playerTableMap[name] = table;
                            this.playersRemaining = this.activePlayers.length;
                            this.lastEliminated = null;
                            this.recomputeTableCounts();
                        } else if (!this.activePlayers.length && this.playersRemaining < this.setupData.totalPlayers) {
                            this.playersRemaining++;
                        }
                        this.updateStats();
                        this.publishState();
                        return;
                    }
                    if (cmd.type === 'confirmLateReg') {
                        // Phone has resolved name + table counts — process the assignment
                        this.lateRegName = cmd.name || '';
                        this.lateRegTableCounts = cmd.tableCounts || {};
                        // Re-run confirmLateRegDraw logic without calling render() or showLateReg
                        const tableKeys = this.tableCount === 1
                            ? ['pokerTable']
                            : this.tableCount === 2
                                ? ['pokerTable', 'kitchenTable']
                                : ['pokerTable', 'kitchenTable', 'poolTable'];
                        const tableNames = { pokerTable: 'Poker Table', kitchenTable: 'Kitchen Table', poolTable: 'Pool Table' };
                        const minCount = Math.min(...tableKeys.map(k => this.lateRegTableCounts[k] || 0));
                        const candidates = tableKeys.filter(k => (this.lateRegTableCounts[k] || 0) === minCount);
                        const chosenKey = candidates[Math.floor(Math.random() * candidates.length)];
                        this.lateRegTableCounts[chosenKey] = (this.lateRegTableCounts[chosenKey] || 0) + 1;
                        this.setupData.totalPlayers++;
                        this.playersRemaining++;
                        this.lateRegCount++;
                        const name = this.lateRegName || `Late Reg ${this.lateRegCount}`;
                        this.originalPlayerNames.push(name);
                        this.redrawSelections.push(false);
                        this.lateRegDraw = { table: tableNames[chosenKey], name };
                        // Track in active players + table map if named mode is active
                        if (this.activePlayers.length > 0 || this.originalPlayerNames.length > 0) {
                            this.activePlayers.push(name);
                            this.playerTableMap[name] = chosenKey;
                        }
                        this.updateStats(); // lightweight DOM patch for counts
                        this.publishState();
                        return;
                    }
                    if (cmd.type === 'closeLateReg') {
                        this.lateRegDraw = null;
                        this.publishState();
                        return;
                    }
                    if (cmd.type === 'performRedraw') {
                        this.redrawTableCount = cmd.tableCount || 1;
                        // Use tracked named players if available, else fall back to numbered seats
                        const players = this.activePlayers.length > 0
                            ? [...this.activePlayers]
                            : Array.from({ length: this.playersRemaining }, (_, i) => `Seat ${i + 1}`);
                        if (players.length >= 2) {
                            const shuffled = this.shuffleArray(players);
                            if (this.redrawTableCount === 1) {
                                this.redrawResult = [{ name: 'Poker Table', players: shuffled }];
                            } else {
                                const count1 = Math.ceil(shuffled.length / 2);
                                this.redrawResult = [
                                    { name: 'Poker Table',   players: shuffled.slice(0, count1) },
                                    { name: 'Kitchen Table', players: shuffled.slice(count1) },
                                ];
                            }
                            // Update playerTableMap if using named players
                            if (this.activePlayers.length > 0) {
                                const nameToKey = { 'Poker Table': 'pokerTable', 'Kitchen Table': 'kitchenTable', 'Pool Table': 'poolTable' };
                                for (const t of this.redrawResult) {
                                    const key = nameToKey[t.name] || 'pokerTable';
                                    for (const p of t.players) this.playerTableMap[p] = key;
                                }
                                this.recomputeTableCounts();
                            }
                            this.showRedraw = true; // pop result on laptop/TV
                            this.render();
                        }
                        this.publishState();
                        return;
                    }
                    if (cmd.type === 'closeRedraw') {
                        this.redrawResult = null;
                        this.showRedraw = false; // dismiss overlay on laptop/TV
                        this.render();
                        this.publishState();
                        return;
                    }
                    if (cmd.type === 'startClock') {
                        this.startClock();
                        return;
                    }
                    if (cmd.type === 'cancelClock') {
                        this.cancelClock();
                        return;
                    }
                    return;
                }
                // ── String commands (main grid buttons) ───────────────────
                const map = {
                    toggleTimer:       () => this.toggleTimer(),
                    nextLevel:         () => this.nextLevel(),
                    prevLevel:         () => this.prevLevel(),
                    addTwoMinutes:     () => this.addTwoMinutes(),
                    toggleExtend:      () => this.toggleExtend(),
                    eliminatePlayer:   () => this.eliminatePlayer(),
                    addPlayer:         () => this.addPlayer(),
                    addRebuy:          () => this.addRebuy(),
                    undoRebuy:         () => this.undoRebuy(),
                };
                if (map[cmd]) {
                    map[cmd]();
                    this.publishState();
                }
            }

            // Patch just the room-code badge without a full re-render
            renderRoomCode() {
                const el = document.getElementById('remote-code-badge');
                if (!el) return;
                el.innerHTML = this.roomCodeBadgeHTML();
            }

            roomCodeBadgeHTML() {
                const dotClass = this.ablyConnected ? 'live' : 'waiting';
                const statusText = this.ablyConnected ? 'Ready' : 'Connecting…';
                return `
                    <div onclick="app.copyRemoteUrl()" title="Tap to copy remote URL"
                         style="display:inline-flex;flex-direction:column;align-items:center;gap:0.5rem;
                                background:rgba(255,255,255,0.04);border:1px solid #2a2a2a;border-radius:0.5rem;
                                padding:0.75rem 1.5rem;cursor:pointer;margin:0 auto;">
                        <div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.15em;color:#666;">
                            Remote Control
                        </div>
                        <div style="font-family:var(--font-mono);font-size:2rem;font-weight:800;letter-spacing:0.2em;color:#fff;">
                            ${this.roomCode}
                        </div>
                        <div style="display:flex;align-items:center;gap:0.4rem;font-size:0.65rem;color:#555;">
                            <div class="remote-conn-dot ${dotClass}"></div>
                            ${statusText} &nbsp;·&nbsp; Tap to copy URL
                        </div>
                    </div>`;
            }

            copyRemoteUrl() {
                const url = `${location.origin}${location.pathname}?remote=${this.roomCode}`;
                navigator.clipboard.writeText(url).catch(() => {});
                // Brief flash feedback
                const el = document.querySelector('.code-val');
                if (el) { const orig = el.textContent; el.textContent = 'COPIED!'; setTimeout(() => { if(el) el.textContent = orig; }, 1200); }
            }

            // ── Full rebuild helper — always call instead of direct innerHTML ──
            rebuildRemote() {
                this.remoteLastFlow = this.remoteFlow;
                this.remoteRendered = true;
                document.getElementById('app').innerHTML = this.renderRemote();
            }

            // ── Patch only the live-updating parts of the main grid ──────────
            patchRemoteMain(s) {
                if (!s) return;

                const setBtn = (id, dimmed) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.style.opacity = dimmed ? '0.2' : '1';
                    el.disabled = !!dimmed;
                };
                // Play/Pause toggle — single button, flips label + colour
                const ppBtn = document.getElementById('r-btn-playpause');
                if (ppBtn) {
                    ppBtn.innerHTML       = s.isRunning ? '⏸&nbsp; Pause' : '▶&nbsp; Play';
                    ppBtn.style.color     = s.isRunning ? '#f59e0b' : '#10b981';
                    ppBtn.style.background = s.isRunning ? '#1a1100' : '#061a0e';
                    ppBtn.disabled = false;
                }
                setBtn('r-btn-rebuy',    !s.areRebuysOpen);
                setBtn('r-btn-undo-rebuy', !s.areRebuysOpen);
                setBtn('r-btn-undo-out', !s.lastEliminatedName);

                // Undo-Out: patch text AND onclick (onclick was baked as "" when no eliminated player existed)
                const undoEl = document.getElementById('r-btn-undo-out');
                if (undoEl) {
                    undoEl.textContent = s.lastEliminatedName
                        ? `↩ ${s.lastEliminatedName}`
                        : 'Undo Out';
                    undoEl.onclick = s.lastEliminatedName
                        ? () => app.remoteUndoEliminate()
                        : null;
                }

                // Clock button — flips between Clock / Cancel Clock
                const clockBtn = document.getElementById('r-btn-clock');
                if (clockBtn) {
                    const active = s.clockActive;
                    clockBtn.textContent      = active ? '✕ Cancel' : '⏱ Clock';
                    clockBtn.style.color      = active ? '#ef4444' : '#ccc';
                    clockBtn.style.background = active ? '#1a0000' : '#0a0a0a';
                    clockBtn.onclick          = active
                        ? () => app.remoteCancelClock()
                        : () => app.remoteStartClock();
                    clockBtn.disabled = false;
                }

            }

            // ── Timer-tick entry point (called every second on remote) ────────
            renderRemoteUpdate() {
                const s = this.remoteState;

                // ── lateReg: block DOM during typing; rebuild only when result arrives ──
                if (this.remoteFlow === 'lateReg') {
                    if (!this.remoteLateRegPending) return; // user still typing — never touch DOM
                    if (s && s.lateRegDraw && this.remoteLastFlow !== 'lateReg-result') {
                        this.remoteLastFlow = 'lateReg-result';
                        document.getElementById('app').innerHTML = this.renderRemote();
                    }
                    return;
                }

                // ── redraw: protect setup screen; rebuild only when result arrives ──
                if (this.remoteFlow === 'redraw' && this.remoteRedrawPending) {
                    if (s && s.redrawResult && this.remoteLastFlow !== 'redraw-result') {
                        this.remoteLastFlow = 'redraw-result';
                        document.getElementById('app').innerHTML = this.renderRemote();
                    }
                    return;
                }

                // ── any other sub-flow (eliminate, redraw setup): freeze the DOM ──
                if (this.remoteFlow !== null) return;

                // ── main grid ──────────────────────────────────────────────────
                // Rebuild when: first render, returning from a flow, or state just
                // arrived for the first time (waiting → live transition).
                const stateJustArrived = !!s && !this.remoteHadState;

                if (!this.remoteRendered || this.remoteLastFlow !== null || stateJustArrived) {
                    this.remoteLastFlow = null;
                    this.remoteRendered = true;
                    try {
                        document.getElementById('app').innerHTML = this.renderRemote();
                        // Only mark state as arrived AFTER a successful render so a
                        // runtime error doesn't permanently lock us on "Waiting for host…"
                        if (stateJustArrived) this.remoteHadState = true;
                    } catch(e) {
                        console.error('renderRemote failed:', e);
                        // remoteHadState stays false → next tick will retry
                    }
                    return;
                }
                // Already showing live buttons — patch only (no scroll reset)
                if (s) this.patchRemoteMain(s);
            }

            renderRemote() {
                const s = this.remoteState;
                const connected = this.ablyConnected;

                // ── Route to sub-screens ──────────────────────────────────
                if (this.remoteFlow === 'eliminate') {
                    return this.renderRemoteEliminateSetup(s, connected);
                }
                if (this.remoteFlow === 'lateReg') {
                    // Show result once we get confirmation back from host
                    if (this.remoteLateRegPending && s && s.lateRegDraw) {
                        return this.renderRemoteLateRegResult(s, connected);
                    }
                    return this.renderRemoteLateRegSetup(s, connected);
                }
                if (this.remoteFlow === 'redraw') {
                    if (this.remoteRedrawPending && s && s.redrawResult) {
                        return this.renderRemoteRedrawResult(s, connected);
                    }
                    return this.renderRemoteRedrawSetup(s, connected);
                }

                const isRunning  = s ? s.isRunning   : false;
                const rebuysOpen = s ? s.areRebuysOpen : false;

                // ── helper to build one cell ─────────────────────────────
                const cell = (label, onclick, opts = {}) => {
                    const { color = '#fff', bg = '#000', dimmed = false, span = false, id = '' } = opts;
                    const opacity = dimmed ? '0.2' : '1';
                    const spanStyle = span ? 'grid-column:1 / -1;' : '';
                    const idAttr = id ? `id="${id}"` : '';
                    return `
                        <button
                            ${idAttr}
                            ${dimmed ? 'disabled' : ''}
                            onclick="${onclick}"
                            style="${spanStyle}background:${bg};color:${color};opacity:${opacity};
                                   border:none;min-height:0;
                                   display:flex;align-items:center;justify-content:center;
                                   font-family:var(--font-ui);font-size:1.4rem;font-weight:700;
                                   text-transform:uppercase;letter-spacing:0.03em;
                                   cursor:pointer;-webkit-tap-highlight-color:transparent;
                                   touch-action:manipulation;-webkit-user-select:none;
                                   transition:filter 0.1s, opacity 0.1s;">
                            ${label}
                        </button>`;
                };

                const hasPlayers = s && s.originalPlayerNames && s.originalPlayerNames.length > 0;

                // ── grid ─────────────────────────────────────────────────
                const gridContent = s ? `
                    <div style="display:grid;grid-template-columns:1fr 1fr;
                                grid-template-rows:repeat(6,1fr);
                                gap:4px;background:#1a1a1a;height:100%;">

                        ${cell(isRunning ? '⏸&nbsp; Pause' : '▶&nbsp; Play',
                               "app.sendCommand('toggleTimer')",
                               { color: isRunning ? '#f59e0b' : '#10b981',
                                 bg:    isRunning ? '#1a1100' : '#061a0e',
                                 span: true, id: 'r-btn-playpause' })}

                        ${cell('← Prev Level', "app.sendCommand('prevLevel')", { color:'#ccc', bg:'#0a0a0a' })}
                        ${cell('Next Level →', "app.sendCommand('nextLevel')", { color:'#ccc', bg:'#0a0a0a' })}

                        ${cell('Player Out', 'app.remoteStartEliminate()', { color:'#ef4444', bg:'#160404' })}
                        ${cell(s.lastEliminatedName ? `↩ ${s.lastEliminatedName}` : 'Undo Out',
                               s.lastEliminatedName ? 'app.remoteUndoEliminate()' : '',
                               { color:'#888', bg:'#0a0a0a', dimmed: !s.lastEliminatedName, id:'r-btn-undo-out' })}

                        ${cell('Rebuy',  "app.sendCommand('addRebuy')",  { color:'#10b981', bg:'#061a0e', dimmed: !rebuysOpen, id:'r-btn-rebuy'      })}
                        ${cell('Cancel', "app.sendCommand('undoRebuy')", { color:'#888',    bg:'#0a0a0a', dimmed: !rebuysOpen, id:'r-btn-undo-rebuy' })}

                        ${cell('+2 Min',   "app.sendCommand('addTwoMinutes')", { color:'#ccc',    bg:'#0a0a0a' })}
                        ${cell('Late Reg', 'app.remoteStartLateReg()',         { color:'#3b82f6', bg:'#04101f' })}

                        ${cell('Redraw', hasPlayers ? 'app.remoteStartRedraw()' : '',
                               { color: hasPlayers ? '#fff' : '#444', bg:'#111', dimmed: !hasPlayers })}

                        ${s.clockActive
                            ? cell('✕ Cancel', 'app.remoteCancelClock()', { color:'#ef4444', bg:'#1a0000', id:'r-btn-clock' })
                            : cell('⏱ Clock',  'app.remoteStartClock()',  { color:'#ccc',    bg:'#0a0a0a', id:'r-btn-clock' })
                        }

                    </div>` : `
                    <div style="flex:1;display:flex;align-items:center;justify-content:center;
                                flex-direction:column;gap:0.75rem;color:#333;">
                        <div style="font-size:0.95rem;">Waiting for host…</div>
                        <div style="font-size:0.75rem;color:#222;">Open the app on the MacBook first</div>
                        <button onclick="location.reload()"
                                style="margin-top:0.5rem;padding:0.4rem 1.2rem;background:#1a1a1a;
                                       border:1px solid #333;border-radius:0.4rem;color:#555;
                                       font-size:0.7rem;cursor:pointer;letter-spacing:0.05em;">
                            Reload
                        </button>
                    </div>`;

                return `
                    <div class="remote-layout">
                        <div style="flex:1;min-height:0;display:flex;flex-direction:column;">
                            ${gridContent}
                        </div>
                    </div>`;
            }

            // ── Remote: Late Reg flow ─────────────────────────────────────

            remoteStartLateReg() {
                const s = this.remoteState;
                if (!s) return;
                // Seed counts from last published state or even split
                const tc = s.tableCount || 1;
                const keys = ['pokerTable', 'kitchenTable', 'poolTable'].slice(0, tc);
                if (s.lateRegTableCounts && Object.keys(s.lateRegTableCounts).length > 0) {
                    this.remoteLateRegCounts = {...s.lateRegTableCounts};
                } else {
                    const base = Math.floor(s.playersRemaining / tc);
                    const extra = s.playersRemaining % tc;
                    this.remoteLateRegCounts = {};
                    keys.forEach((k, i) => { this.remoteLateRegCounts[k] = base + (i < extra ? 1 : 0); });
                }
                this.remoteLateRegName = '';
                this.remoteLateRegPending = false;
                this.remoteFlow = 'lateReg';
                this.rebuildRemote();
            }

            remoteAdjustLateRegCount(key, delta) {
                this.remoteLateRegCounts[key] = Math.max(0, (this.remoteLateRegCounts[key] || 0) + delta);
                this.rebuildRemote();
            }

            remoteSetLateRegName(value) {
                this.remoteLateRegName = value;
                // Patch only the confirm button — never touch the input itself (preserves caret/keyboard)
                const btn = document.getElementById('r-late-reg-confirm');
                if (!btn) return;
                const s = this.remoteState;
                const namedMode = s && s.activePlayers && s.activePlayers.length > 0;
                const nameOk = value.trim().length > 0;
                let canAssign;
                if (namedMode) {
                    canAssign = nameOk;
                } else {
                    const tc = s ? (s.tableCount || 1) : 1;
                    const keys = ['pokerTable', 'kitchenTable', 'poolTable'].slice(0, tc);
                    const total = keys.reduce((sum, k) => sum + (this.remoteLateRegCounts[k] || 0), 0);
                    const expected = s ? s.playersRemaining : 0;
                    canAssign = nameOk && (total === expected);
                }
                canAssign = canAssign && !this.remoteLateRegPending;
                btn.disabled = !canAssign;
                btn.style.background = canAssign ? '#10b981' : '#1a2a22';
                btn.style.color      = canAssign ? '#fff'    : '#2a4a3a';
            }

            remoteConfirmLateReg() {
                this.remoteLateRegName = (document.getElementById('remote-late-reg-name') || {value: this.remoteLateRegName}).value.trim();
                if (!this.remoteLateRegName) return;
                this.remoteLateRegPending = true;
                this.sendCommand({ type: 'confirmLateReg', name: this.remoteLateRegName, tableCounts: {...this.remoteLateRegCounts} });
                this.rebuildRemote();
            }

            remoteDoneLateReg() {

            remoteStartClock() {

            }

            remoteStartRedraw() {
                const s = this.remoteState;
                if (!s) return;
                this.remoteRedrawTableCount = s.tableCount || 1;
                this.remoteRedrawPending = false;
                this.remoteFlow = 'redraw';
                this.rebuildRemote();
            }

            remoteSetRedrawTableCount(count) {
                this.remoteRedrawTableCount = count;
                this.rebuildRemote();
            }

            remoteConfirmRedraw() {
                if (this.remoteRedrawPending) return;
                this.remoteRedrawPending = true;
                // Send only tableCount — host owns the authoritative player list
                this.sendCommand({ type: 'performRedraw', tableCount: this.remoteRedrawTableCount });
                this.rebuildRemote();
            }

            remoteDoneRedraw() {
                this.sendCommand({ type: 'closeRedraw' });
                this.remoteFlow = null;
                this.remoteRedrawPending = false;
                this.rebuildRemote();
            }

            remoteCancelRedraw() {
                this.remoteFlow = null;
                this.remoteRedrawPending = false;
                this.rebuildRemote();
            }

            renderRemoteRedrawSetup(s, connected) {
                const dot = `<div class="remote-conn-dot ${connected ? 'live' : 'waiting'}" style="width:8px;height:8px;"></div>`;
                const pending = this.remoteRedrawPending;
                const playerCount = s ? ((s.activePlayers && s.activePlayers.length) || s.playersRemaining || 0) : 0;

                const tabBtn = (label, count) => {

                    return `<button onclick="app.remoteSetRedrawTableCount(${count})"
                                    style="flex:1;padding:1rem 0;border:none;border-radius:0.5rem;cursor:pointer;
                                           background:${active ? '#3b82f6' : '#1a1a1a'};
                                           color:${active ? '#fff' : '#555'};

                    <div class="remote-layout">

                        <!-- top strip -->
                        <div style="display:flex;align-items:center;justify-content:space-between;
                                    padding:0.6rem 1rem;border-bottom:1px solid #111;flex-shrink:0;">
                            <button onclick="app.remoteCancelRedraw()"

                            <span style="font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.15em;">

                            <div>
                                <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;

                                    Draw to
                                </div>

                                    ${tabBtn('2 Tables', 2)}

                        <div style="padding:1rem 1.25rem;display:flex;flex-direction:column;gap:0.6rem;
                                    flex-shrink:0;border-top:1px solid #111;">
                            <button onclick="app.remoteConfirmRedraw()"
                                    ${pending ? 'disabled' : ''}
                                    style="width:100%;padding:1.2rem;border:none;border-radius:0.5rem;
                                           background:${pending ? '#0d1a2a' : '#3b82f6'};
                                           color:${pending ? '#1a3a5a' : '#fff'};
                                           font-size:1.2rem;font-weight:700;font-family:var(--font-ui);
                                           text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;
                                           -webkit-tap-highlight-color:transparent;touch-action:manipulation;">
                                ${pending ? 'Drawing…' : (this.remoteRedrawTableCount === 1 ? 'Draw Final Table' : 'Redraw Tables')}
                            </button>
                            <button onclick="app.remoteCancelRedraw()"
                                    style="width:100%;padding:0.85rem;border:1px solid #222;border-radius:0.5rem;

                                           font-size:1rem;font-family:var(--font-ui);cursor:pointer;
                                           -webkit-tap-highlight-color:transparent;touch-action:manipulation;">

                            </button>

            }

            renderRemoteRedrawResult(s, connected) {
                const dot = `<div class="remote-conn-dot ${connected ? 'live' : 'waiting'}" style="width:8px;height:8px;"></div>`;
                const result = s.redrawResult || [];
                const title = result.length === 1 ? 'Final Table' : 'Table Redraw';

                return `
                    <div class="remote-layout">

                        <!-- top strip -->
                        <div style="display:flex;align-items:center;justify-content:space-between;
                                    padding:0.6rem 1rem;border-bottom:1px solid #111;flex-shrink:0;">
                            <span style="font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.15em;">
                                ${title}
                            </span>
                            <div style="display:flex;align-items:center;gap:0.4rem;font-size:0.65rem;color:#666;">
                                ${dot}
                            </div>
                        </div>

                        <!-- scrollable table assignments -->
                        <div class="remote-scroll-area" style="padding:1.25rem;">
                            ${result.map(table => `
                                <div style="margin-bottom:1.5rem;">
                                    <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.2em;color:#3b82f6;margin-bottom:0.75rem;">
                                        ${table.name}
                                    </div>
                                    ${table.players.map((player, idx) => `
                                        <div style="display:flex;align-items:center;gap:0.75rem;
                                                    padding:0.85rem 0.75rem;border-bottom:1px solid #0f0f0f;">
                                            <span style="font-family:var(--font-mono);font-size:0.8rem;color:#444;
                                                         min-width:1.5rem;">${idx + 1}</span>
                                            <span style="font-size:1rem;font-weight:500;">${player}</span>
                                        </div>

                        <!-- done button -->
                        <div style="padding:1.5rem 1.25rem;flex-shrink:0;border-top:1px solid #111;">

                                           background:#3b82f6;color:#fff;
                                           font-size:1.2rem;font-weight:700;font-family:var(--font-ui);
                                           text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;
                                           -webkit-tap-highlight-color:transparent;touch-action:manipulation;">

                            </button>
